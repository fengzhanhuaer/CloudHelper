<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>CloudHelper Probe Node</title>
  <link rel="stylesheet" href="app.css">
</head>
<body data-page="status">
  <div class="shell">
    <aside>
      <h1 class="brand">CloudHelper<br>Probe Node</h1>
      <nav>
        <a class="nav-button" data-page="status" href="status.html">状态</a>
        <a class="nav-button" data-page="link" href="link.html">链路</a>
        <a class="nav-button" data-page="proxy" href="proxy.html">代理</a>
        <a class="nav-button" data-page="settings" href="settings.html">设置</a>
      </nav>
    </aside>
    <main>
      <h2 id="pageTitle" class="page-title">状态</h2>
      <p id="pageSubtitle" class="page-subtitle"></p>
      <section class="page">
        <div class="sub-tabs" role="tablist" aria-label="状态页">
          <button id="statusOverviewTab" class="sub-tab-button active" type="button" role="tab" aria-selected="true" aria-controls="statusOverviewPanel" data-status-tab="overview">概览</button>
          <button id="statusConnectionsTab" class="sub-tab-button" type="button" role="tab" aria-selected="false" aria-controls="statusConnectionsPanel" data-status-tab="connections">连接</button>
          <button id="statusLogsTab" class="sub-tab-button" type="button" role="tab" aria-selected="false" aria-controls="statusLogsPanel" data-status-tab="logs">日志</button>
        </div>
        <div id="statusOverviewPanel" class="tab-panel" role="tabpanel" aria-labelledby="statusOverviewTab">
          <div class="key-value">
            <div>主控</div>
            <div id="summaryController"></div>
            <div>Node ID</div>
            <div id="summaryNodeId"></div>
            <div>配置</div>
            <div id="summaryReady"></div>
            <div>运行</div>
            <div id="summaryRuntime"></div>
            <div>本地版本</div>
            <div id="summaryLocalVersion"></div>
            <div>VPN</div>
            <div id="summaryVpn"></div>
            <div>DNS 接管</div>
            <div id="summaryDns"></div>
            <div>Fake IP / Hint</div>
            <div id="summaryDnsCache"></div>
            <div>VPN 自检</div>
            <div id="summaryVpnSelfCheck"></div>
          </div>
          <div class="actions compact">
            <button id="vpnSelfCheckButton" class="command secondary" type="button">VPN 自检</button>
          </div>
          <div id="status" class="status-box"></div>
        </div>
        <div id="statusConnectionsPanel" class="tab-panel" role="tabpanel" aria-labelledby="statusConnectionsTab" hidden>
          <div class="actions compact">
            <button id="refreshConnectionsButton" class="command secondary" type="button">刷新</button>
          </div>
          <div id="connectionStatus" class="inline-feedback"></div>
          <div id="connectionList" class="connection-list"></div>
        </div>
        <div id="statusLogsPanel" class="tab-panel" role="tabpanel" aria-labelledby="statusLogsTab" hidden>
          <div class="actions compact">
            <button id="refreshLogsButton" class="command secondary" type="button">刷新</button>
            <button id="clearLogsButton" class="command neutral" type="button">清空</button>
          </div>
          <div id="logStatus" class="inline-feedback"></div>
          <div id="logList" class="log-list"></div>
        </div>
      </section>
    </main>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
