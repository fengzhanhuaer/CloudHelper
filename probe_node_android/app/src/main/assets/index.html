<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CloudHelper Probe Node</title>
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f4;
      color: #171717;
    }
    body {
      margin: 0;
      padding: 20px;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 24px;
      font-weight: 700;
    }
    label {
      display: block;
      margin-top: 12px;
      font-size: 13px;
      color: #44403c;
    }
    input {
      box-sizing: border-box;
      width: 100%;
      height: 44px;
      margin-top: 6px;
      border: 1px solid #c9c5bd;
      border-radius: 6px;
      padding: 0 12px;
      font-size: 16px;
      background: #fff;
      color: #171717;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }
    button {
      height: 44px;
      border: 0;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 650;
      background: #0f766e;
      color: #fff;
    }
    button.secondary {
      background: #334155;
    }
    button.neutral {
      background: #57534e;
    }
    #status {
      margin: 14px 0 4px;
      min-height: 42px;
      line-height: 1.45;
      color: #292524;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <main>
    <h1>CloudHelper Probe Node</h1>
    <div id="status"></div>

    <label for="controllerUrl">Controller URL</label>
    <input id="controllerUrl" autocomplete="off" placeholder="https://controller.example.com">

    <label for="nodeId">Node ID</label>
    <input id="nodeId" autocomplete="off">

    <label for="nodeSecret">Node Secret</label>
    <input id="nodeSecret" type="password" autocomplete="off">

    <div class="toolbar">
      <button onclick="saveConfig()">Save</button>
      <button class="secondary" onclick="startCore()">Start</button>
      <button class="neutral" onclick="stopCore()">Stop</button>
      <button class="neutral" onclick="checkUpgrade('direct')">Direct Upgrade</button>
      <button class="neutral" onclick="checkUpgrade('proxy')">Proxy Upgrade</button>
    </div>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    window.CloudHelperUI = {
      setStatus(message) {
        statusEl.textContent = message || "";
      }
    };

    function loadConfig() {
      const raw = window.CloudHelper.loadConfig();
      const config = JSON.parse(raw || "{}");
      document.getElementById("controllerUrl").value = config.controllerUrl || "";
      document.getElementById("nodeId").value = config.nodeId || "";
      document.getElementById("nodeSecret").value = config.nodeSecret || "";
      window.CloudHelperUI.setStatus(config.ready ? `Status: ${config.status}` : "Set controller URL, node ID, and node secret.");
    }

    function saveConfig() {
      const status = window.CloudHelper.saveConfig(
        document.getElementById("controllerUrl").value,
        document.getElementById("nodeId").value,
        document.getElementById("nodeSecret").value
      );
      window.CloudHelperUI.setStatus(`Saved. Status: ${status}`);
    }

    function startCore() {
      saveConfig();
      window.CloudHelperUI.setStatus(`Start: ${window.CloudHelper.start()}`);
    }

    function stopCore() {
      window.CloudHelperUI.setStatus(`Stop: ${window.CloudHelper.stop()}`);
    }

    function checkUpgrade(mode) {
      saveConfig();
      window.CloudHelperUI.setStatus(`Checking ${mode} upgrade...`);
      window.CloudHelper.checkUpgrade(mode);
    }

    loadConfig();
    setInterval(() => {
      window.CloudHelperUI.setStatus(`Status: ${window.CloudHelper.status()}`);
    }, 5000);
  </script>
</body>
</html>
