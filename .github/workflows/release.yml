name: Build and Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'version'

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump_version.outputs.new_version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump Version and Tag
        id: bump_version
        shell: bash
        run: |
          if [ ! -f "version" ]; then
            echo "0.0.0" > version
          fi

          VERSION=$(cat version | tr -d '\r')
          IFS='.' read -r -a parts <<< "$VERSION"
          patch=$((parts[2] + 1))
          NEW_VERSION="${parts[0]}.${parts[1]}.$patch"
          echo "$NEW_VERSION" > version
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push

          git tag "v$NEW_VERSION"
          git push origin "v$NEW_VERSION"

  build-probe-controller:
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Tagged Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: v${{ needs.prepare-release.outputs.new_version }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Build Probe Controller (Linux amd64)
        working-directory: probe_controller
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
          NEW_VERSION: ${{ needs.prepare-release.outputs.new_version }}
        shell: bash
        run: go build -ldflags "-X github.com/cloudhelper/probe_controller/internal/core.BuildVersion=v${NEW_VERSION}" -o cloudhelper-probe-controller-linux-amd64 .

      - name: Upload Probe Controller Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudhelper-probe-controller-linux-amd64
          path: probe_controller/cloudhelper-probe-controller-linux-amd64

  build-probe-node:
    needs: prepare-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: cloudhelper-probe-node-linux-amd64
            artifact_name: cloudhelper-probe-node-linux-amd64
          - goos: linux
            goarch: arm64
            output: cloudhelper-probe-node-linux-arm64
            artifact_name: cloudhelper-probe-node-linux-arm64
          - goos: windows
            goarch: amd64
            output: cloudhelper-probe-node-windows-amd64.exe
            artifact_name: cloudhelper-probe-node-windows-amd64.exe
    steps:
      - name: Checkout Tagged Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: v${{ needs.prepare-release.outputs.new_version }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Build Probe Node (${{ matrix.goos }} ${{ matrix.goarch }})
        working-directory: probe_node
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          NEW_VERSION: ${{ needs.prepare-release.outputs.new_version }}
        shell: bash
        run: go build -ldflags "-X main.BuildVersion=v${NEW_VERSION}" -o ${{ matrix.output }} .

      - name: Upload Probe Node Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: probe_node/${{ matrix.output }}

  create-release:
    needs:
      - prepare-release
      - build-probe-controller
      - build-probe-node
    runs-on: ubuntu-latest
    steps:
      - name: Download Probe Controller Artifact
        uses: actions/download-artifact@v4
        with:
          name: cloudhelper-probe-controller-linux-amd64
          path: release-assets

      - name: Download Probe Node Artifact
        uses: actions/download-artifact@v4
        with:
          name: cloudhelper-probe-node-linux-amd64
          path: release-assets

      - name: Download Probe Node Artifact (arm64)
        uses: actions/download-artifact@v4
        with:
          name: cloudhelper-probe-node-linux-arm64
          path: release-assets

      - name: Download Probe Node Artifact (windows amd64)
        uses: actions/download-artifact@v4
        with:
          name: cloudhelper-probe-node-windows-amd64.exe
          path: release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare-release.outputs.new_version }}
          name: Release v${{ needs.prepare-release.outputs.new_version }}
          files: |
            release-assets/cloudhelper-probe-controller-linux-amd64
            release-assets/cloudhelper-probe-node-linux-amd64
            release-assets/cloudhelper-probe-node-linux-arm64
            release-assets/cloudhelper-probe-node-windows-amd64.exe
