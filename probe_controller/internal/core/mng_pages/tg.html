<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CloudHelper TG 助手管理</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background: radial-gradient(circle at top, #1a2436 0%, #0d1117 45%, #090c12 100%);
      color: #dceaff;
      min-height: 100vh;
    }
    .wrap {
      width: min(1280px, 96vw);
      margin: 3vh auto;
      border: 1px solid rgba(150, 185, 240, 0.2);
      border-radius: 14px;
      background: rgba(10, 16, 26, 0.78);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.35);
      padding: 16px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: 24px; }
    .sub { margin: 6px 0 0; color: #9fc2ff; font-size: 13px; }
    .btn {
      min-width: 108px;
      border: 1px solid rgba(130, 176, 246, 0.36);
      background: rgba(35, 52, 78, 0.75);
      color: #fff;
      border-radius: 8px;
      height: 34px;
      padding: 0 12px;
      cursor: pointer;
    }
    .btn.primary {
      border-color: rgba(126, 200, 255, 0.66);
      background: linear-gradient(180deg, rgba(77, 138, 220, 0.88) 0%, rgba(55, 107, 186, 0.92) 100%);
    }
    .btn.warn {
      border-color: rgba(250, 176, 108, 0.66);
      background: linear-gradient(180deg, rgba(171, 110, 48, 0.92) 0%, rgba(132, 82, 36, 0.92) 100%);
    }
    .btn:disabled { opacity: .58; cursor: not-allowed; }
    .btn:hover:enabled { filter: brightness(1.06); }

    .status {
      border: 1px solid rgba(126, 200, 255, 0.3);
      background: rgba(8, 14, 23, 0.62);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.45;
      min-height: 38px;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 12px;
    }
    .status.ok { border-color: rgba(112, 221, 159, 0.46); color: #9ff7c0; }
    .status.err { border-color: rgba(255, 145, 145, 0.52); color: #ffadad; }
    .status.warn { border-color: rgba(255, 196, 122, 0.52); color: #ffd38f; }

    .content-block {
      border: 1px solid rgba(150, 185, 240, 0.2);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      padding: 14px;
    }
    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .title-row h2 { margin: 0; font-size: 22px; }
    .content-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .identity-card {
      border: 1px solid rgba(150, 185, 240, 0.2);
      border-radius: 12px;
      background: rgba(7, 11, 18, 0.42);
      padding: 12px;
      color: #e1ecff;
      display: grid;
      gap: 10px;
    }
    .subtab-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .subtab-btn {
      border: 1px solid rgba(140, 177, 238, 0.4);
      background: rgba(30, 47, 73, 0.7);
      border-radius: 999px;
      color: #dceaff;
      height: 34px;
      padding: 0 14px;
      cursor: pointer;
    }
    .subtab-btn.active {
      border-color: rgba(153, 204, 255, 0.82);
      background: rgba(70, 122, 204, 0.68);
    }

    .tg-account-summary {
      border: 1px solid rgba(150, 185, 240, 0.2);
      border-radius: 10px;
      background: rgba(8, 14, 24, 0.55);
      padding: 12px;
      display: grid;
      gap: 12px;
    }
    .tg-account-basic-list {
      display: grid;
      gap: 8px;
    }
    .tg-account-basic-row {
      display: grid;
      grid-template-columns: 132px 1fr;
      gap: 10px;
      align-items: center;
      font-size: 14px;
    }
    .tg-account-basic-label { color: #9fc2ff; font-size: 13px; }
    .tg-account-basic-value { word-break: break-word; }
    .tg-account-summary-line { color: #b9d7ff; font-size: 13px; line-height: 1.45; }

    .tg-schedule-panel,
    .tg-schedule-list {
      display: grid;
      gap: 10px;
    }
    .probe-table-wrap {
      width: 100%;
      overflow-x: auto;
      border: 1px solid rgba(150, 185, 240, 0.2);
      border-radius: 8px;
      background: rgba(7, 12, 18, 0.58);
    }
    table.probe-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }
    .probe-table th,
    .probe-table td {
      border-bottom: 1px solid rgba(150, 185, 240, 0.14);
      text-align: left;
      vertical-align: top;
      padding: 8px 7px;
      font-size: 13px;
      color: #dceaff;
    }
    .probe-table th {
      color: #9fc2ff;
      font-weight: 600;
      background: rgba(30, 45, 71, 0.38);
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .probe-table-sub {
      color: #8caedc;
      font-size: 12px;
      margin-top: 2px;
      word-break: break-all;
    }
    .tg-schedule-table-message {
      white-space: pre-wrap;
      word-break: break-word;
      max-width: 420px;
    }
    .tg-schedule-table-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tg-schedule-row-toggle,
    .tg-schedule-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
    }

    .probe-settings-modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(5, 8, 12, 0.66);
      display: grid;
      place-items: center;
      z-index: 999;
      padding: 12px;
    }
    .probe-settings-modal {
      width: min(860px, 96vw);
      max-height: 92vh;
      overflow: auto;
      border: 1px solid rgba(150, 185, 240, 0.28);
      border-radius: 12px;
      background: rgba(10, 16, 26, 0.98);
      box-shadow: 0 12px 42px rgba(0, 0, 0, 0.5);
      padding: 14px;
    }
    .row {
      display: grid;
      grid-template-columns: 126px 1fr;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    .row label {
      color: #9fc2ff;
      text-align: right;
      font-size: 13px;
    }
    .input,
    select.input,
    textarea.input {
      width: 100%;
      border: 1px solid rgba(150, 185, 240, 0.32);
      border-radius: 8px;
      outline: none;
      background: rgba(7, 12, 19, 0.84);
      color: #fff;
      padding: 7px 10px;
      font-size: 13px;
      line-height: 1.4;
    }
    .input:focus,
    select.input:focus,
    textarea.input:focus {
      border-color: rgba(154, 210, 255, 0.92);
    }
    textarea.input { min-height: 100px; resize: vertical; }

    .tg-schedule-field {
      margin-bottom: 10px;
      display: grid;
      gap: 6px;
    }
    .tg-target-picker {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .muted { color: #8eaed6; }

    @media (max-width: 860px) {
      .row,
      .tg-account-basic-row {
        grid-template-columns: 1fr;
      }
      .row label,
      .tg-account-basic-label {
        text-align: left;
      }
      .topbar { align-items: flex-start; }
      .btn { min-width: 94px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>/mng/tg</h1>
        <p class="sub">参照 manager 侧统一交互：账号登录、任务管理、TG Bot 全流程。</p>
      </div>
      <div class="content-actions">
        <button id="btn-back" class="btn" type="button">返回磁贴面板</button>
        <button id="btn-logout" class="btn" type="button">退出登录</button>
      </div>
    </div>

    <div id="status-box" class="status">初始化中...</div>

    <div class="content-block">
      <div class="title-row">
        <h2>TG助手</h2>
        <div class="content-actions">
          <button id="btn-account-manage" class="btn" type="button">账号管理</button>
          <button id="btn-login-account" class="btn" type="button">登录账号</button>
          <button id="btn-api-settings" class="btn" type="button">设置API</button>
        </div>
      </div>
      <p class="muted">共享 API Key（API ID / API Hash）、账号与登录、任务管理、Bot 管理。</p>

      <div id="identity-card" class="identity-card"></div>
    </div>
  </div>

  <div id="modal-root"></div>

  <script>
    const state = {
      loading: false,
      scheduleLoading: false,
      pendingLoading: false,
      targetRefreshing: false,
      botLoading: false,
      scheduleHistoryLoading: false,

      status: '初始化中...',
      statusLevel: '',

      api: { api_id: 0, api_hash: '', configured: false },
      accounts: [],
      selectedAccountID: '',
      activeLoggedInAccountID: '',
      activeSubTab: 'basic-info',

      scheduleList: [],
      targetList: [],
      filteredTargetList: [],
      pendingTaskItems: [],
      scheduleHistoryItems: [],
      scheduleHistoryTaskID: '',

      botConfig: {
        api_key: '',
        configured: false,
        mode: 'polling',
        webhook_path: '',
        webhook_enabled: false,
      },

      modal: {
        apiKey: false,
        addAccount: false,
        manageAccount: false,
        scheduleTask: false,
        scheduleHistory: false,
        botAPIKey: false,
      },

      draft: {
        apiKeyID: '',
        apiKeyHash: '',

        addAccountSelectedID: '',
        addAccountLabel: '',
        addAccountPhone: '',
        loginCode: '',
        loginPassword: '',

        scheduleEditingTaskID: '',
        scheduleEnabled: false,
        scheduleTarget: '',
        scheduleTargetSearch: '',
        scheduleSendAt: '每天 09:00',
        scheduleMessage: '',
        scheduleDelayMax: '0',

        botMode: 'polling',
        botAPIKey: '',
        botTestMessage: 'ping from bot test',
      },
      scheduleRequestSeq: 0,
    };

    function qs(id) {
      return document.getElementById(id);
    }

    function setStatus(message, level) {
      state.status = String(message || '');
      state.statusLevel = String(level || '');
      renderStatus();
    }

    function renderStatus() {
      const box = qs('status-box');
      box.textContent = state.status;
      box.className = 'status';
      if (state.statusLevel) {
        box.classList.add(state.statusLevel);
      }
    }
    function escapeHTML(value) {
      return String(value || '').replace(/[&<>"\x27]/g, (ch) => {
        if (ch === '&') return '&' + 'amp;';
        if (ch === '<') return '&' + 'lt;';
        if (ch === '>') return '&' + 'gt;';
        if (ch === '"') return '&' + 'quot;';
        return '&' + '#39;';
      });
    }

    async function requestJSON(url, options = {}) {
      const response = await fetch(url, { credentials: 'same-origin', ...options });
      let payload = {};
      try { payload = await response.json(); } catch (_) {}
      if (!response.ok) {
        const msg = payload && payload.error ? payload.error : `HTTP ${response.status}`;
        throw new Error(msg);
      }
      return payload;
    }

    function getLoggedInAccounts() {
      return state.accounts.filter((item) => item && item.authorized);
    }

    function getSelectedAccount() {
      return state.accounts.find((item) => item.id === state.selectedAccountID) || null;
    }

    function getActiveLoggedInAccount() {
      return getLoggedInAccounts().find((item) => item.id === state.activeLoggedInAccountID) || null;
    }

    function normalizePhone(raw) {
      const value = String(raw || '').trim();
      if (!value) return '';
      return value.replace(/[^+\d]/g, '');
    }

    function formatDateTime(raw) {
      const value = String(raw || '').trim();
      if (!value) return '-';
      const dt = new Date(value);
      if (Number.isNaN(dt.getTime())) return value;
      return dt.toLocaleString();
    }

    function renderTargetLabel(targetID) {
      const id = String(targetID || '').trim();
      if (!id) return '-';
      const hit = state.targetList.find((item) => item.id === id);
      if (!hit) return id;
      if (hit.username && String(hit.username).trim()) {
        return `${hit.name} (@${hit.username})`;
      }
      return hit.name;
    }

    function syncSelectedAccounts() {
      if (state.accounts.length === 0) {
        state.selectedAccountID = '';
        state.activeLoggedInAccountID = '';
        return;
      }
      if (!state.accounts.some((item) => item.id === state.selectedAccountID)) {
        state.selectedAccountID = state.accounts[0].id;
      }
      const loggedIn = getLoggedInAccounts();
      if (loggedIn.length === 0) {
        state.activeLoggedInAccountID = '';
        return;
      }
      if (!loggedIn.some((item) => item.id === state.activeLoggedInAccountID)) {
        state.activeLoggedInAccountID = loggedIn[0].id;
      }
    }

    function setLoadingState(patch) {
      Object.assign(state, patch);
      renderMain();
    }

    function openModal(key) {
      state.modal[key] = true;
      renderModal();
    }

    function closeModal(key) {
      if (key === 'scheduleTask' && state.scheduleLoading) return;
      if (key === 'scheduleHistory' && state.scheduleHistoryLoading) return;
      if (key === 'botAPIKey' && state.botLoading) return;
      if ((key === 'addAccount' || key === 'manageAccount' || key === 'apiKey') && state.loading) return;
      state.modal[key] = false;
      renderModal();
    }

    function renderMain() {
      syncSelectedAccounts();
      const loggedInAccounts = getLoggedInAccounts();
      const activeLoggedInAccount = getActiveLoggedInAccount();

      const headerButtonsDisabled = state.loading;
      qs('btn-account-manage').disabled = headerButtonsDisabled;
      qs('btn-login-account').disabled = headerButtonsDisabled || !state.api.configured;
      qs('btn-api-settings').disabled = headerButtonsDisabled;

      let html = '';
      html += '<div>已登录账号 Tab</div>';

      if (loggedInAccounts.length === 0) {
        html += '<div>当前没有已登录账号。</div>';
      } else {
        html += '<div class="subtab-list">';
        loggedInAccounts.forEach((item) => {
          const active = state.activeLoggedInAccountID === item.id ? ' active' : '';
          html += `<button class="subtab-btn${active}" data-action="switch-active-account" data-account-id="${escapeHTML(item.id)}" type="button">${escapeHTML(item.label || item.id)}</button>`;
        });
        html += '</div>';

        html += '<div class="subtab-list">';
        html += `<button class="subtab-btn${state.activeSubTab === 'basic-info' ? ' active' : ''}" data-action="switch-subtab" data-subtab="basic-info" type="button">基础信息</button>`;
        html += `<button class="subtab-btn${state.activeSubTab === 'scheduled-send' ? ' active' : ''}" data-action="switch-subtab" data-subtab="scheduled-send" type="button">定时发送</button>`;
        html += `<button class="subtab-btn${state.activeSubTab === 'tg-bot' ? ' active' : ''}" data-action="switch-subtab" data-subtab="tg-bot" type="button">TG BOT</button>`;
        html += '</div>';

        if (activeLoggedInAccount) {
          html += '<div class="tg-account-summary">';

          if (state.activeSubTab === 'basic-info') {
            html += renderBasicInfoBlock(activeLoggedInAccount);
          } else if (state.activeSubTab === 'tg-bot') {
            html += renderBotBlock(activeLoggedInAccount);
          } else {
            html += renderScheduleBlock(activeLoggedInAccount);
          }

          html += '</div>';
        } else {
          html += '<div class="tg-account-summary-line">请先选择一个已登录账号。</div>';
        }
      }

      qs('identity-card').innerHTML = html;
      bindDynamicMainEvents();
    }

    function renderBasicInfoBlock(account) {
      return `
        <div class="tg-account-basic-list">
          <div class="tg-account-basic-row"><div class="tg-account-basic-label">当前账号</div><div class="tg-account-basic-value">${escapeHTML(account.label || '-')}</div></div>
          <div class="tg-account-basic-row"><div class="tg-account-basic-label">手机号</div><div class="tg-account-basic-value">${escapeHTML(account.phone || '-')}</div></div>
          <div class="tg-account-basic-row"><div class="tg-account-basic-label">显示名</div><div class="tg-account-basic-value">${escapeHTML(account.self_display_name || '-')}</div></div>
          <div class="tg-account-basic-row"><div class="tg-account-basic-label">用户名</div><div class="tg-account-basic-value">${escapeHTML(account.self_username || '-')}</div></div>
          <div class="tg-account-basic-row"><div class="tg-account-basic-label">最近登录</div><div class="tg-account-basic-value">${escapeHTML(formatDateTime(account.last_login_at || ''))}</div></div>
        </div>
      `;
    }

    function renderBotBlock(account) {
      const bot = state.botConfig;
      return `
        <div class="tg-schedule-panel">
          <div class="tg-account-basic-row"><div class="tg-account-basic-label">当前账号</div><div class="tg-account-basic-value">${escapeHTML(account.label)} (${escapeHTML(account.phone)})</div></div>
          <div class="tg-account-basic-row"><div class="tg-account-basic-label">BOT 状态</div><div class="tg-account-basic-value">${bot.configured ? '已配置' : '未配置'}</div></div>
          <div class="tg-account-basic-row"><div class="tg-account-basic-label">接收模式</div><div class="tg-account-basic-value">${bot.mode === 'webhook' ? 'webhook' : 'getUpdates'}</div></div>
          <div class="tg-account-basic-row"><div class="tg-account-basic-label">当前 Key</div><div class="tg-account-basic-value">${bot.configured ? escapeHTML(bot.api_key) : '-'}</div></div>
          ${bot.mode === 'webhook' ? `<div class="tg-account-basic-row"><div class="tg-account-basic-label">Webhook 回调</div><div class="tg-account-basic-value">${escapeHTML(bot.webhook_path || '-')} ${bot.webhook_enabled ? '(已启用)' : '(未启用)'}</div></div>` : ''}
          <div class="tg-schedule-field">
            <label class="tg-account-basic-label" for="tg-bot-test-message">测试消息</label>
            <textarea id="tg-bot-test-message" class="input" ${state.loading || state.botLoading ? 'disabled' : ''}>${escapeHTML(state.draft.botTestMessage)}</textarea>
          </div>
          <div class="content-actions">
            <button class="btn" data-action="open-bot-api-modal" type="button" ${state.loading || state.botLoading ? 'disabled' : ''}>设置 BOT API key</button>
            <button class="btn" data-action="refresh-bot-config" type="button" ${state.loading || state.botLoading ? 'disabled' : ''}>${state.botLoading ? '刷新中...' : '刷新 BOT 配置'}</button>
            <button class="btn" data-action="test-bot-send" type="button" ${state.loading || state.botLoading || !bot.configured ? 'disabled' : ''}>测试发送</button>
          </div>
        </div>
      `;
    }

    function renderScheduleBlock(account) {
      let taskRows = '';
      if (state.scheduleList.length === 0) {
        taskRows = '<div class="tg-account-summary-line">当前账号暂无任务。</div>';
      } else {
        taskRows += '<div class="probe-table-wrap"><table class="probe-table" style="min-width:900px"><thead><tr>';
        taskRows += '<th>任务类型</th><th>启用</th><th>发送目标</th><th>发送时间</th><th>发送内容</th><th>操作</th>';
        taskRows += '</tr></thead><tbody>';
        state.scheduleList.forEach((task) => {
          taskRows += '<tr>';
          taskRows += `<td>${escapeHTML(task.task_type === 'scheduled_send' ? '定时发送' : (task.task_type || '-'))}</td>`;
          taskRows += `<td><label class="tg-schedule-row-toggle"><input data-action="toggle-task" data-task-id="${escapeHTML(task.id)}" type="checkbox" ${task.enabled ? 'checked' : ''} ${state.loading || state.scheduleLoading ? 'disabled' : ''}><span>${task.enabled ? '启用' : '停用'}</span></label></td>`;
          taskRows += `<td>${escapeHTML(renderTargetLabel(task.target || ''))}</td>`;
          taskRows += `<td>${escapeHTML(task.send_at || '-')}</td>`;
          taskRows += `<td><div class="tg-schedule-table-message">${escapeHTML(task.message || '-')}</div></td>`;
          taskRows += '<td><div class="tg-schedule-table-actions">';
          taskRows += `<button class="btn" data-action="edit-task" data-task-id="${escapeHTML(task.id)}" ${state.loading || state.scheduleLoading || task.task_type !== 'scheduled_send' ? 'disabled' : ''}>编辑</button>`;
          taskRows += `<button class="btn" data-action="send-now" data-task-id="${escapeHTML(task.id)}" ${state.loading || state.scheduleLoading || task.task_type !== 'scheduled_send' ? 'disabled' : ''}>立即发送</button>`;
          taskRows += `<button class="btn" data-action="task-history" data-task-id="${escapeHTML(task.id)}" ${state.loading || state.scheduleLoading ? 'disabled' : ''}>任务记录</button>`;
          taskRows += `<button class="btn" data-action="remove-task" data-task-id="${escapeHTML(task.id)}" ${state.loading || state.scheduleLoading ? 'disabled' : ''}>删除任务</button>`;
          taskRows += '</div></td>';
          taskRows += '</tr>';
        });
        taskRows += '</tbody></table></div>';
      }

      let pendingRows = '';
      if (state.pendingTaskItems.length === 0) {
        pendingRows = '<div class="tg-account-summary-line">当前没有待执行任务。</div>';
      } else {
        pendingRows += '<div class="probe-table-wrap"><table class="probe-table" style="min-width:980px"><thead><tr>';
        pendingRows += '<th>任务ID</th><th>发送目标</th><th>发送时间</th><th>发送内容</th><th>随机延时(秒)</th><th>下一次执行</th><th>超时执行</th><th>状态</th><th>更新时间</th>';
        pendingRows += '</tr></thead><tbody>';
        state.pendingTaskItems.forEach((item) => {
          pendingRows += '<tr>';
          pendingRows += `<td><div>${escapeHTML(item.task_id || '-')}</div><div class="probe-table-sub">${escapeHTML(item.job_key || '-')}</div></td>`;
          pendingRows += `<td>${escapeHTML(renderTargetLabel(item.target || ''))}</td>`;
          pendingRows += `<td>${escapeHTML(item.send_at || '-')}</td>`;
          pendingRows += `<td><div class="tg-schedule-table-message">${escapeHTML(item.message || '-')}</div></td>`;
          pendingRows += `<td>${escapeHTML(String(item.delay_sec ?? 0))}</td>`;
          pendingRows += `<td>${escapeHTML(formatDateTime(item.next_run_at || ''))}</td>`;
          pendingRows += `<td>${escapeHTML(formatDateTime(item.timeout_at || ''))}</td>`;
          pendingRows += `<td>${!item.task_exists ? '任务不存在' : item.enabled ? '待执行' : '任务停用'}</td>`;

    function buildFilteredTargetList() {
      const keyword = String(state.draft.scheduleTargetSearch || '').trim().toLowerCase();
      let list = Array.isArray(state.targetList) ? state.targetList.slice() : [];
      if (keyword) {
        list = list.filter((item) => {
          const id = String(item.id || '').toLowerCase();
          const name = String(item.name || '').toLowerCase();
          const username = String(item.username || '').toLowerCase();
          return id.includes(keyword) || name.includes(keyword) || username.includes(keyword);
        });
      }
      if (state.draft.scheduleTarget.trim()) {
        const selected = state.targetList.find((item) => item.id === state.draft.scheduleTarget.trim());
        if (selected && !list.some((item) => item.id === selected.id)) {
          list = [selected, ...list];
        }
      }
      state.filteredTargetList = list;
      return list;
    }

        renderMain();

        renderModal();

            setStatus('请先设置 API，再添加/登录账号', 'warn');

    async function handleStartLoginFromInput() {
      if (!state.api.configured) {
        setStatus('请先设置 API', 'warn');
        return;
      }
      const selectedID = String(state.draft.addAccountSelectedID || '').trim();
      const inputLabel = String(state.draft.addAccountLabel || '').trim();
      const inputPhone = normalizePhone(state.draft.addAccountPhone || '');

      state.loading = true;
      renderMain();
      renderModal();
      setStatus('正在准备步骤1：输入账号并开始登录...');
      try {
        let account = null;
        if (selectedID) {
          account = state.accounts.find((item) => item.id === selectedID) || null;
          if (!account) {
            throw new Error('所选账号不存在，请重新选择');
          }
        } else {
          if (!inputPhone) {
            throw new Error('手机号不能为空');
          }
          if (!inputPhone.startsWith('+')) {
            throw new Error('手机号必须包含国家区号，例如 +86...');
          }
          const payload = await requestJSON('/mng/api/tg/account/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ label: inputLabel, phone: inputPhone }),
          });
          account = payload.account || null;
          await loadAccounts({ silent: true });
        }

        await requestJSON('/mng/api/tg/account/send_code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ account_id: account.id }),
        });

        await loadAccounts({ silent: true });
        state.selectedAccountID = String(account.id || '');
        state.draft.addAccountSelectedID = String(account.id || '');
        state.draft.loginCode = '';
        state.draft.loginPassword = '';
        setStatus(`验证码已发送到 ${account.phone}，请在弹窗继续完成登录`, 'ok');
      } catch (error) {
        setStatus(`发送验证码失败：${error.message || error}`, 'err');
      } finally {
        state.loading = false;
        renderMain();
        renderModal();
      }
    }

    async function handleSaveScheduleTask() {
      const active = getActiveLoggedInAccount();
      if (!active) {
        setStatus('请先选择一个已登录账号', 'warn');
        return;
      }

      const editingTaskID = String(state.draft.scheduleEditingTaskID || '').trim();
      const target = String(state.draft.scheduleTarget || '').trim();
      const sendAt = String(state.draft.scheduleSendAt || '').trim();
      const message = String(state.draft.scheduleMessage || '').trim();
      const delayMax = Number.parseInt(String(state.draft.scheduleDelayMax || '0').trim(), 10) || 0;
      const enabled = state.draft.scheduleEnabled === true;
      const isEditing = !!editingTaskID;

      if (!target) {
        setStatus('请先选择发送目标', 'warn');
        return;
      }
      if (enabled && !sendAt) {
        setStatus('请填写定时发送时间', 'warn');
        return;
      }
      if (enabled && !message) {
        setStatus('请填写定时发送内容', 'warn');
        return;
      }
      if (delayMax < 0) {
        setStatus('随机延时最大值不能小于 0', 'warn');
        return;
      }

      state.scheduleLoading = true;
      renderMain();
      renderModal();
      setStatus(isEditing ? `正在修改任务：${editingTaskID}...` : `正在为账号 ${active.label} 新增任务...`);
      try {
        const endpoint = isEditing ? '/mng/api/tg/schedule/update' : '/mng/api/tg/schedule/add';
        const payload = {
          account_id: active.id,
          task_id: editingTaskID,
          task_type: 'scheduled_send',
          enabled,
          target,
          send_at: sendAt,
          message,
          delay_min_sec: 0,
          delay_max_sec: delayMax,
        };
        const res = await requestJSON(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const schedules = Array.isArray(res.schedules) ? res.schedules : [];
        state.scheduleList = schedules;
        state.modal.scheduleTask = false;
        state.draft.scheduleEditingTaskID = '';
        state.draft.scheduleTargetSearch = '';

        await loadPendingTasks(active.id, { silent: true });
        setStatus(isEditing ? `任务已更新（当前共 ${schedules.length} 个）` : `已新增任务：${active.label}（当前共 ${schedules.length} 个）`, 'ok');
      } catch (error) {
        setStatus(`${isEditing ? '修改任务' : '新增任务'}失败：${error.message || error}`, 'err');
      } finally {
        state.scheduleLoading = false;
        renderMain();
        renderModal();
      }
    }

      setStatus(`正在立即发送任务：${taskID}...`);
      try {
        const res = await requestJSON('/mng/api/tg/schedule/send_now', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ account_id: active.id, task_id: taskID }),
        });
        const result = res.result || {};
        const target = result.target || '-';
        const sentAt = formatDateTime(result.sent_at || '');
        setStatus(`任务已立即发送：目标 ${target}，时间 ${sentAt}`, 'ok');
      } catch (error) {
        setStatus(`立即发送失败：${error.message || error}`, 'err');
      } finally {
        state.scheduleLoading = false;
        renderMain();
      }
    }

    async function openScheduleTaskHistoryModal(taskID) {
      const active = getActiveLoggedInAccount();
      if (!active) {
        setStatus('请先选择一个已登录账号', 'warn');
        return;
      }
      state.modal.scheduleHistory = true;
      state.scheduleHistoryTaskID = taskID;
      state.scheduleHistoryItems = [];
      state.scheduleHistoryLoading = true;
      renderModal();
      setStatus(`正在加载任务记录：${taskID}...`);
      try {
        const res = await requestJSON('/mng/api/tg/schedule/history', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ account_id: active.id, task_id: taskID, limit: 50 }),
        });
        const history = Array.isArray(res.history) ? res.history : [];
        state.scheduleHistoryItems = history;
        setStatus(`已加载任务记录：${history.length} 条`, 'ok');
      } catch (error) {
        setStatus(`加载任务记录失败：${error.message || error}`, 'err');
      } finally {
        state.scheduleHistoryLoading = false;
        renderModal();
      }
    }

    function openBotAPIKeyModal() {
      const active = getActiveLoggedInAccount();
      if (!active) {
        setStatus('请先选择一个已登录账号', 'warn');
        return;
      }
      state.draft.botAPIKey = state.botConfig.api_key || '';
      state.draft.botMode = state.botConfig.mode === 'webhook' ? 'webhook' : 'polling';
      state.modal.botAPIKey = true;
      renderModal();
    }

    async function handleSaveBotAPIKey() {
      const active = getActiveLoggedInAccount();
      if (!active) {
        setStatus('请先选择一个已登录账号', 'warn');
        return;
      }
      const apiKey = String(state.draft.botAPIKey || '').trim();
      const mode = state.draft.botMode === 'webhook' ? 'webhook' : 'polling';

      if (!apiKey) {
        setStatus('BOT API key 不能为空', 'warn');
        return;
      }
      if (!apiKey.includes(':')) {
        setStatus('BOT API key 格式不正确', 'warn');
        return;
      }

      state.botLoading = true;
      renderMain();
      renderModal();
      setStatus('正在保存 TG BOT API key...');
      try {
        const payload = await requestJSON('/mng/api/tg/bot/set', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            account_id: active.id,
            api_key: apiKey,
            mode,
          }),
        });
        state.botConfig = {
          api_key: payload.api_key || apiKey,
          configured: payload.configured === true,
          mode: payload.mode === 'webhook' ? 'webhook' : 'polling',
          webhook_path: payload.webhook_path || '',
          webhook_enabled: payload.webhook_enabled === true,
        };
        state.modal.botAPIKey = false;
        setStatus(`TG BOT 配置已保存（模式：${mode === 'webhook' ? 'webhook' : 'getUpdates'}）`, 'ok');
      } catch (error) {
        setStatus(`保存 TG BOT API key 失败：${error.message || error}`, 'err');
      } finally {
        state.botLoading = false;
        renderMain();
        renderModal();
      }
    }

    async function handleTestBotSend() {
      const active = getActiveLoggedInAccount();
      if (!active) {
        setStatus('请先选择一个已登录账号', 'warn');
        return;
      }
      const message = String(state.draft.botTestMessage || '').trim();
      if (!message) {
        setStatus('请输入测试消息内容', 'warn');
        return;
      }

      state.botLoading = true;
      renderMain();
      setStatus('正在发送 TG BOT 测试消息...');
      try {
        const res = await requestJSON('/mng/api/tg/bot/test_send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ account_id: active.id, message }),
        });
        const result = res.result || {};
        const text = String(result.message || '').trim();
        if (text) {
          setStatus(`TG BOT 测试发送成功：${text}`, 'ok');
        } else {
          setStatus(`TG BOT 测试发送成功：chat_id=${result.chat_id} message_id=${result.message_id}`, 'ok');
        }
      } catch (error) {
        setStatus(`TG BOT 测试发送失败：${error.message || error}`, 'err');
      } finally {
        state.botLoading = false;
        renderMain();
      }
    }

    async function ensureSession() {
      const payload = await requestJSON('/mng/api/session');
      if (!payload.authenticated) {
        location.href = '/mng';
        return false;
      }
      return true;
    }

    async function logout() {
      await fetch('/mng/api/logout', { method: 'POST', credentials: 'same-origin' });
      location.href = '/mng';
    }

    async function bootstrap() {
      bindStaticEvents();
      renderStatus();
      renderMain();
      renderModal();

      const ok = await ensureSession().catch(() => false);
      if (!ok) {
        location.href = '/mng';
        return;
      }

      await loadData();
      const active = getActiveLoggedInAccount();
      if (active) {
        await Promise.all([
          loadSchedule(active.id, { silent: true }),
          loadPendingTasks(active.id, { silent: true }),
          loadTargets(active.id, { silent: true }),
          loadBotAPIKey(active.id, { silent: true }),
        ]);
      }
      setStatus('TG 页面初始化完成', 'ok');
      renderMain();
      renderModal();
    }

    bootstrap().catch((err) => {
      setStatus(`初始化失败：${err && err.message ? err.message : err}`, 'err');
    });
  </script>
</body>
</html>
