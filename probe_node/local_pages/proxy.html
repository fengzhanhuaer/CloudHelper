<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Probe Node 代理状态</title>
  <style>
    :root {
      --bg-color: #0d1117;
      --panel-bg: rgba(22, 27, 34, 0.68);
      --text-primary: #c9d1d9;
      --text-secondary: #8b949e;
      --heading: #e6edf3;
      --accent: #58a6ff;
      --accent-strong: #1f6feb;
      --warn: #f85149;
      --border-soft: rgba(255, 255, 255, 0.12);
      --border-strong: rgba(88, 166, 255, 0.45);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      color: var(--text-primary);
      background: var(--bg-color);
      background-image: radial-gradient(circle at 50% 0%, #1f2937 0%, transparent 70%);
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
    }
    main { max-width: 920px; margin: 0 auto; }
    h1 { margin-bottom: 8px; color: #fff; }
    .hint { color: var(--text-secondary); font-size: 13px; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:14px; }
    .nav { display:flex; gap:8px; flex-wrap:wrap; }
    .nav a {
      padding: 8px 12px;
      border-radius: 8px;
      color: #d0d7de;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(139, 148, 158, 0.2);
    }
    .nav a.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #fff;
      border-color: rgba(255,255,255,0.2);
    }
    .card {
      border: 1px solid var(--border-soft);
      border-radius: 12px;
      padding: 16px;
      margin-top: 14px;
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.32);
    }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
    .tab-btn {
      background: rgba(139, 148, 158, 0.16);
      border-color: rgba(255,255,255,0.16);
      color: #d0d7de;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #fff;
    }
    .proxy-tab-panel { display: none; }
    .proxy-tab-panel.active { display: block; }
    button {
      padding: 8px 12px;
      border: 1px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #fff;
      font-weight: 600;
    }
    button:hover { filter: brightness(1.07); }
    button.secondary {
      background: rgba(139, 148, 158, 0.2);
      border-color: rgba(255, 255, 255, 0.18);
      color: #d0d7de;
    }
    button.warn {
      background: linear-gradient(135deg, #ff7b72, #d73a49);
      border-color: rgba(255, 255, 255, 0.12);
    }
    .kv {
      display: grid;
      grid-template-columns: 170px 1fr;
      row-gap: 6px;
      column-gap: 8px;
      margin-top: 8px;
      font-size: 14px;
    }
    .kv > div:nth-child(odd) { color: var(--text-secondary); }
    .rule-group-list { display: grid; gap: 10px; margin-top: 10px; }
    .rule-group-row {
      border: 1px solid var(--border-soft);
      border-radius: 10px;
      padding: 10px;
      background: rgba(13, 17, 23, 0.45);
    }
    .rule-group-title { font-weight: 600; font-size: 13px; color: var(--heading); margin-bottom: 6px; }
    .rule-options-flat { display: flex; gap: 8px; flex-wrap: wrap; }
    .rule-option-flat {
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 7px;
      background: rgba(139, 148, 158, 0.12);
      color: #d0d7de;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
    }
    .rule-option-flat.active {
      border-color: var(--border-strong);
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #fff;
    }
    .rule-runtime { margin-top: 6px; font-size: 12px; color: var(--text-secondary); }
    .table-wrap { overflow-x: auto; margin-top: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 680px; }
    th, td { border-bottom: 1px solid var(--border-soft); padding: 9px 8px; text-align: left; vertical-align: top; }
    th { color: var(--heading); font-weight: 700; background: rgba(13, 17, 23, 0.45); }
    td.muted, .muted { color: var(--text-secondary); }
    .link-info { display: grid; gap: 5px; }
    .link-info-line { display: grid; grid-template-columns: 44px minmax(0, 1fr); column-gap: 8px; }
    .pre-line { white-space: pre-line; }
    .mini-actions { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; }
    .mini-actions button { padding: 6px 9px; font-size: 12px; }
    .copy-ip { color: var(--accent); cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }
    .copy-ip:hover { color: #79c0ff; }
    .status-ok { color: #7ee787; }
    .status-bad { color: #ff938d; }
    .status-warn { color: #f2cc60; }
    .msg { margin-top: 14px; min-height: 20px; font-size: 14px; }
    .msg.error { color: #ff938d; }
    .msg.success { color: #7ee787; }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <div>
        <h1>代理状态</h1>
        <p class="hint">代理状态、组选链与开关控制。</p>
      </div>
      <div class="nav">
        <a href="/local/panel">首页</a>
        <a href="/local/proxy" class="active">代理状态</a>
        <a href="/local/dns">DNS 状态</a>
        <a href="/local/monitor">状态监视</a>
        <a href="/local/logs">运行日志</a>
        <a href="/local/system">系统设置</a>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="groups">代理组</button>
      <button class="tab-btn" data-tab="links">链路状态</button>
    </div>

    <section id="panelProxy" class="card proxy-tab-panel active" data-tab-panel="groups">
      <strong>代理状态</strong>
      <div class="kv">
        <div>接管开关</div><div id="proxyEnabled">-</div>
        <div>当前模式</div><div id="proxyMode">-</div>
        <div>最近错误</div><div id="proxyLastError">-</div>
        <div>规则组备份</div><div id="proxyGroupBackupStatus">-</div>
      </div>
      <div class="actions">
        <button id="proxyGlobalToggleBtn" class="secondary">启用代理</button>
        <button id="proxyRefreshBtn" class="secondary">刷新代理状态</button>
        <button id="proxyGroupRefreshBtn" class="secondary">刷新代理组</button>
        <button id="proxyChainRefreshBtn" class="secondary">刷新链路</button>
        <button id="proxyGroupBackupBtn" class="secondary">备份代理规则组</button>
        <button id="proxyGroupRestoreBtn" class="secondary">恢复代理规则组</button>
      </div>
      <div id="proxyRuleGroups" class="rule-group-list"></div>
      <p class="hint">参照 manager：按“每个代理组”展示可选策略（直连 + 拒绝 + 可用链路），刷新代理组会清空本地 DNS / Fake IP 缓存。</p>
    </section>

    <section id="panelProxyLinks" class="card proxy-tab-panel" data-tab-panel="links">
      <strong>链路状态</strong>
      <p class="hint">每条代理链路一行。延迟执行链路握手探测；测速使用专用 speed_test 模式，真实读取测试数据，不进入业务 bridge。</p>
      <div class="actions">
        <button id="proxyLinkStatusRefreshBtn" class="secondary">刷新链路状态</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>链路</th>
              <th>状态 / 质量 / 测速</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="proxyLinkStatusRows">
            <tr><td colspan="3" class="muted">暂无链路状态</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <p id="message" class="msg"></p>
  </main>

  <script>
    const messageEl = document.getElementById('message');
    const proxyRuleGroupsEl = document.getElementById('proxyRuleGroups');
    const proxyLinkStatusRowsEl = document.getElementById('proxyLinkStatusRows');
    let proxyStateGroupsCache = [];
    let proxyChainItemsCache = [];
    let proxyLinkStatusCache = [];
    let proxyStatusCache = { enabled: false, mode: '' };
    let proxyStatusPollingTimer = null;
    let proxyRuntimeRefreshInFlight = false;
    const PROXY_STATUS_POLL_INTERVAL_MS = 60000;

    function setMessage(text, type) {
      messageEl.textContent = text || '';
      messageEl.className = 'msg' + (type ? ' ' + type : '');
    }

    function setText(id, value) {
      const el = document.getElementById(id);
      if (!el) return;
      const clean = (value === undefined || value === null || value === '') ? '-' : String(value);
      el.textContent = clean;
    }

    function isProxyGloballyEnabled() {
      return !!proxyStatusCache.enabled && normalizeAction(proxyStatusCache.mode) === 'tunnel';
    }

    function updateProxyGlobalToggleButton() {
      const btn = document.getElementById('proxyGlobalToggleBtn');
      if (!btn) return;
      if (isProxyGloballyEnabled()) {
        btn.textContent = '关闭代理';
        btn.classList.remove('secondary');
        btn.classList.add('warn');
        return;
      }
      btn.textContent = '启用代理';
      btn.classList.remove('warn');
      btn.classList.add('secondary');
    }

    function updateProxyGroupBackupStatus(backup) {
      const status = backup || {};
      const uploadStatus = String(status.last_upload_status || 'idle').trim();
      const uploadTime = String(status.last_uploaded_at || '').trim();
      const uploadError = String(status.last_upload_error || '').trim();
      const restoreStatus = String(status.last_restore_status || 'idle').trim();
      const restoreTime = String(status.last_restored_at || '').trim();
      const restoreError = String(status.last_restore_error || '').trim();
      const parts = [];
      parts.push(`备份: ${uploadStatus}${uploadTime ? ` ${uploadTime}` : ''}${uploadError ? ` (${uploadError})` : ''}`);
      parts.push(`恢复: ${restoreStatus}${restoreTime ? ` ${restoreTime}` : ''}${restoreError ? ` (${restoreError})` : ''}`);
      setText('proxyGroupBackupStatus', parts.join(' ｜ '));
    }

    function normalizeChainID(chainValue) {
      const text = String(chainValue || '').trim();
      if (!text) return '';
      if (text.toLowerCase().startsWith('chain:')) {
        return text.slice('chain:'.length).trim();
      }
      return text;
    }

    function normalizeAction(actionValue) {
      return String(actionValue || '').trim().toLowerCase();
    }

    function resolveChainLabel(chainID) {
      const clean = normalizeChainID(chainID);
      if (!clean) return '-';
      const found = proxyChainItemsCache.find((item) => {
        return normalizeChainID(item && item.chain_id) === clean;
      });
      if (!found) return clean;
      const name = String(found && found.name || '').trim();
      return name || clean;
    }

    async function applyGroupPolicy(group, action, tunnelNodeID) {
      if (action === 'direct') {
        await requestJSON('/local/api/proxy/direct', {
          method: 'POST',
          body: JSON.stringify({ group }),
        });
        return;
      }
      if (action === 'reject') {
        await requestJSON('/local/api/proxy/reject', {
          method: 'POST',
          body: JSON.stringify({ group }),
        });
        return;
      }
      await requestJSON('/local/api/proxy/select', {
        method: 'POST',
        body: JSON.stringify({
          group,
          selected_chain_id: tunnelNodeID || '',
        }),
      });
    }

    function isGroupOptionSelected(stateEntry, action, tunnelNodeID) {
      const currentAction = normalizeAction(stateEntry && stateEntry.action);
      if (currentAction !== normalizeAction(action)) {
        return false;
      }
      if (normalizeAction(action) !== 'tunnel') {
        return true;
      }
      return normalizeChainID(stateEntry && stateEntry.tunnel_node_id) === normalizeChainID(tunnelNodeID);
    }

    function renderProxyRuleGroupRows(groupNames) {
      proxyRuleGroupsEl.innerHTML = '';
      const chainOptions = proxyChainItemsCache.map((item) => ({
        chainID: normalizeChainID(item && item.chain_id),
        label: resolveChainLabel(item && item.chain_id),
      })).filter((item) => item.chainID);

      groupNames.forEach((groupName) => {
        const stateEntry = proxyStateGroupsCache.find((entry) => {
          return String(entry && entry.group || '').trim().toLowerCase() === groupName.toLowerCase();
        }) || null;

        const rowEl = document.createElement('div');
        rowEl.className = 'rule-group-row';

        const titleEl = document.createElement('div');
        titleEl.className = 'rule-group-title';
        titleEl.textContent = groupName === 'fallback' ? '兜底组（未命中规则）' : `组：${groupName}`;
        rowEl.appendChild(titleEl);

        const optionsEl = document.createElement('div');
        optionsEl.className = 'rule-options-flat';

        const directBtn = document.createElement('button');
        directBtn.className = `rule-option-flat ${isGroupOptionSelected(stateEntry, 'direct', '') ? 'active' : ''}`;
        directBtn.textContent = '直连';
        directBtn.addEventListener('click', async () => {
          setMessage(`组 ${groupName} 切换直连中...`);
          try {
            await applyGroupPolicy(groupName, 'direct', '');
            await refreshAll();
            setMessage(`组 ${groupName} 已切换直连`, 'success');
          } catch (err) {
            setMessage(`组 ${groupName} 切换失败：${err.message}`, 'error');
          }
        });
        optionsEl.appendChild(directBtn);

        const rejectBtn = document.createElement('button');
        rejectBtn.className = `rule-option-flat ${isGroupOptionSelected(stateEntry, 'reject', '') ? 'active' : ''}`;
        rejectBtn.textContent = '拒绝';
        rejectBtn.addEventListener('click', async () => {
          setMessage(`组 ${groupName} 切换拒绝中...`);
          try {
            await applyGroupPolicy(groupName, 'reject', '');
            await refreshAll();
            setMessage(`组 ${groupName} 已切换拒绝`, 'success');
          } catch (err) {
            setMessage(`组 ${groupName} 切换失败：${err.message}`, 'error');
          }
        });
        optionsEl.appendChild(rejectBtn);

        chainOptions.forEach((item) => {
          const btn = document.createElement('button');
          btn.className = `rule-option-flat ${isGroupOptionSelected(stateEntry, 'tunnel', item.chainID) ? 'active' : ''}`;
          btn.textContent = item.label;
          btn.addEventListener('click', async () => {
            setMessage(`组 ${groupName} 切换链路中...`);
            try {
              await applyGroupPolicy(groupName, 'tunnel', item.chainID);
              await refreshAll();
              setMessage(`组 ${groupName} 已切换到 ${item.label}`, 'success');
            } catch (err) {
              setMessage(`组 ${groupName} 切换失败：${err.message}`, 'error');
            }
          });
          optionsEl.appendChild(btn);
        });

        rowEl.appendChild(optionsEl);

        const runtimeEl = document.createElement('div');
        runtimeEl.className = 'rule-runtime';
        const runtimeAction = normalizeAction(stateEntry && stateEntry.action);
        const runtimeStatusText = formatRuntimeStatusText((stateEntry && stateEntry.group_runtime_status) || (stateEntry && stateEntry.runtime_status), stateEntry);
        const runtimeTunnelLabel = runtimeAction === 'tunnel'
          ? resolveChainLabel(stateEntry && stateEntry.selected_chain_id)
          : '-';
        const protocolStatusText = formatProtocolStatusText(stateEntry && stateEntry.protocol_state);
        runtimeEl.textContent = `运行：${runtimeAction || '-'}${runtimeAction === 'tunnel' ? ` (${runtimeTunnelLabel})` : ''}${runtimeStatusText ? ` ｜ 状态：${runtimeStatusText}` : ''}${protocolStatusText ? ` ｜ 协议：${protocolStatusText}` : ''}`;
        rowEl.appendChild(runtimeEl);

        proxyRuleGroupsEl.appendChild(rowEl);
      });
    }

    const REQUEST_TIMEOUT_DEFAULT_MS = 20000;

    function resolveRequestTimeoutMs(url, timeoutMs) {
      if (Number.isFinite(Number(timeoutMs)) && Number(timeoutMs) > 0) {
        return Number(timeoutMs);
      }
      return REQUEST_TIMEOUT_DEFAULT_MS;
    }

    async function requestJSON(url, options, timeoutMs) {
      const requestTimeoutMs = resolveRequestTimeoutMs(url, timeoutMs);
      const controller = new AbortController();
      const timeoutID = setTimeout(() => controller.abort(), requestTimeoutMs);
      let res;
      try {
        res = await fetch(url, {
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          ...options,
          signal: controller.signal,
        });
      } catch (err) {
        if (err && err.name === 'AbortError') {
          throw new Error(`请求超时(${Math.trunc(requestTimeoutMs / 1000)}s): ${url}`);
        }
        throw err;
      } finally {
        clearTimeout(timeoutID);
      }
      let data = {};
      try {
        data = await res.json();
      } catch (_) {
        data = {};
      }
      if (!res.ok) {
        const msg = (data && data.error) ? data.error : ('HTTP ' + res.status);
        const err = new Error(msg);
        err.status = res.status;
        err.payload = data;
        throw err;
      }
      return data;
    }

    async function ensureSession() {
      try {
        const data = await requestJSON('/local/api/auth/session', { method: 'GET' });
        if (!data.authenticated) {
          window.location.href = '/local/login';
          return false;
        }
        return true;
      } catch (err) {
        if (err && err.status === 401) {
          window.location.href = '/local/login';
          return false;
        }
        throw err;
      }
    }

    function formatRuntimeStatusText(rawStatus, stateEntry) {
      const action = normalizeAction(stateEntry && stateEntry.action);
      const status = String(rawStatus || '').trim();
      if (action === 'tunnel') {
        const latencyMs = Number(stateEntry && stateEntry.selected_chain_latency_ms);
        const hasLatencyMs = stateEntry && Object.prototype.hasOwnProperty.call(stateEntry, 'selected_chain_latency_ms') && Number.isFinite(latencyMs) && latencyMs > 0;
        const latencyMsDisplay = hasLatencyMs ? String(Math.max(1, Math.trunc(latencyMs))) : '';
        const latencyStatus = String(stateEntry && stateEntry.selected_chain_latency_status || '').trim().toLowerCase();
        const latencyError = String(stateEntry && stateEntry.selected_chain_latency_error || '').trim();
        if (latencyStatus === 'reachable' && hasLatencyMs) {
          return `最近测试延迟: ${latencyMsDisplay}ms`;
        }
        if (latencyStatus === 'reachable') {
          return status ? `已连接（${status}）` : '已连接';
        }
        if (latencyError) {
          return `最近测试延迟: 不可达（${latencyError}）`;
        }
        if (status === 'connected' || status === 'online') {
          return status === 'connected' ? '已连接' : '在线';
        }
        if (status) {
          return `最近测试延迟: 不可达（${status}）`;
        }
        return '最近测试延迟: 不可达';
      }
      if (!status) return '';
      return status;
    }

    function formatProtocolStatusText(protocolState) {
      if (!protocolState || typeof protocolState !== 'object') {
        return '';
      }
      const selected = normalizeRelayProtocol(protocolState.selected_protocol);
      const reason = String(protocolState.selection_reason || '').trim();
      const qualities = Array.isArray(protocolState.protocol_qualities) ? protocolState.protocol_qualities : [];
      const listeners = Array.isArray(protocolState.listener_statuses) ? protocolState.listener_statuses : [];
      const parts = [];
      qualities
        .slice()
        .sort((a, b) => String(a && a.protocol || '').localeCompare(String(b && b.protocol || '')))
        .forEach((item) => {
          const protocol = normalizeRelayProtocol(item && item.protocol);
          if (!protocol) return;
          const protocolLabel = formatRelayProtocolLabel(protocol);
          const latency = Number(item && item.latency_ms);
          const score = Number(item && item.score);
          const loss = Number(item && item.loss_permille);
          const rate = Number(item && item.rate_bps);
          const metrics = [];
          if (Number.isFinite(latency) && latency > 0) metrics.push(`${Math.trunc(latency)}ms`);
          if (Number.isFinite(loss) && loss > 0) metrics.push(`丢包${(loss / 10).toFixed(1)}%`);
          if (Number.isFinite(rate) && rate > 0) metrics.push(`${formatRate(rate)}`);
          if (Number.isFinite(score) && score > 0) metrics.push(`分${Math.trunc(score)}`);
          if (item && item.available === false) metrics.push('不可用');
          parts.push(`${protocolLabel}${metrics.length ? `(${metrics.join('/')})` : ''}`);
        });
      const head = selected ? `auto=${formatRelayProtocolLabel(selected)}` : 'auto';
      const tail = parts.length ? ` ${parts.join(' ')}` : '';
      const listenerText = listeners.length
        ? ` 入口${listeners.map((item) => `${formatRelayProtocolLabel(item && item.protocol)}:${String(item && item.status || '').trim() || '-'}`).join('/')}`
        : '';
      return `${head}${reason ? `/${reason}` : ''}${tail}${listenerText}`;
    }

    function normalizeRelayProtocol(raw) {
      return String(raw || '').trim().toLowerCase();
    }

    function formatRelayProtocolLabel(raw) {
      const value = normalizeRelayProtocol(raw);
      if (value === 'http2' || value === 'h2') return 'HTTP/2';
      if (value === 'http3' || value === 'h3') return 'HTTP/3(QUIC)';
      if (value === 'websocket') return 'WebSocket';
      if (value === 'websocket-h3' || value === 'h3-websocket' || value === 'ws-h3') return 'WebSocket over HTTP/3';
      return value || '?';
    }

    function formatRate(rateBps) {
      const value = Number(rateBps);
      if (!Number.isFinite(value) || value <= 0) return '';
      if (value >= 1024 * 1024) return `${(value / 1024 / 1024).toFixed(1)}MB/s`;
      if (value >= 1024) return `${(value / 1024).toFixed(1)}KB/s`;
      return `${Math.trunc(value)}B/s`;
    }

    function formatRateText(rateBps) {
      return formatRate(rateBps) || '-';
    }

    function formatLinkStatusText(item) {
      const status = String(item && item.status || '').trim();
      if (status === 'observed') return '有观测';
      if (status === 'tested') return '已测速';
      if (status === 'unreachable') return '不可达';
      if (status === 'unconfigured') return '配置不完整';
      if (status === 'no_result') return '无结果';
      return status || '-';
    }

    function linkStatusClass(status) {
      const value = String(status || '').trim();
      if (value === 'observed' || value === 'tested' || value === 'reachable') return 'status-ok';
      if (value === 'unreachable' || value === 'unconfigured') return 'status-bad';
      return 'status-warn';
    }

    function formatProtocolQualities(protocolState) {
      if (!protocolState || typeof protocolState !== 'object') return '-';
      const selected = normalizeRelayProtocol(protocolState.selected_protocol);
      const qualities = Array.isArray(protocolState.protocol_qualities) ? protocolState.protocol_qualities : [];
      const parts = qualities
        .slice()
        .sort((a, b) => String(a && a.protocol || '').localeCompare(String(b && b.protocol || '')))
        .map((item) => {
          const protocol = normalizeRelayProtocol(item && item.protocol);
          if (!protocol) return '';
          const protocolLabel = formatRelayProtocolLabel(protocol);
          const latency = Number(item && item.latency_ms);
          const loss = Number(item && item.loss_permille);
          const rate = Number(item && item.rate_bps);
          const score = Number(item && item.score);
          const failures = Number(item && item.failure_count);
          const metrics = [];
          metrics.push(`延迟=${Number.isFinite(latency) && latency > 0 ? Math.trunc(latency) + 'ms' : '-'}`);
          metrics.push(`丢包=${Number.isFinite(loss) ? (loss / 10).toFixed(1) + '%' : '-'}`);
          metrics.push(`速率=${formatRateText(rate)}`);
          metrics.push(`score=${Number.isFinite(score) && score > 0 ? Math.trunc(score) : '-'}`);
          if (Number.isFinite(failures) && failures > 0) metrics.push(`失败=${Math.trunc(failures)}`);
          if (item && item.available === false) metrics.push('不可用');
          return `${protocolLabel}${selected === protocol ? ' *' : ''}: ${metrics.join(' ')}`;
        })
        .filter(Boolean);
      return parts.length ? parts.join('\n') : (selected ? `auto=${formatRelayProtocolLabel(selected)}` : '-');
    }

    function isCFProxyLinkItem(item) {
      const values = [
        item && item.client_entry_type,
        item && item.client_entry_id,
        item && item.chain_id,
        item && item.chain_name,
      ].map((value) => String(value || '').trim().toLowerCase());
      return values.some((value) => value === 'cf' || value.endsWith('_cf'));
    }

    function formatCFOptimizeStatusHTML(status, item) {
      if (!status || typeof status !== 'object') return '';
      const state = String(status.status || '').trim();
      const parts = [];
      if (state) parts.push(escapeHTML(state));
      if (status.running) parts.push('后台优选中');
      const bestIP = String(status.best_ip || '').trim();
      const bestProtocol = normalizeRelayProtocol(status.best_protocol);
      const dns = String(status.entry_host || item && item.entry_host || '').trim();
      const latency = Number(status.best_latency_ms);
      if (bestIP) {
        const copyValue = dns ? `${dns},${bestIP}` : bestIP;
        const ipHTML = `<span class="copy-ip" role="button" tabindex="0" title="复制 ${escapeHTML(copyValue)}" data-copy-cf-ip="${escapeHTML(bestIP)}" data-copy-cf-dns="${escapeHTML(dns)}">${escapeHTML(bestIP)}</span>`;
        parts.push(`best=${ipHTML}${bestProtocol ? '/' + escapeHTML(formatRelayProtocolLabel(bestProtocol)) : ''}${Number.isFinite(latency) && latency > 0 ? '/' + Math.trunc(latency) + 'ms' : ''}`);
      }
      const tested = Number(status.tested_count);
      const planned = Number(status.planned_count);
      const candidates = Number(status.candidate_count);
      if (Number.isFinite(tested) && tested > 0) {
        const total = Number.isFinite(planned) && planned > 0
          ? Math.trunc(planned)
          : (Number.isFinite(candidates) && candidates > 0 ? Math.trunc(candidates * 2) : 0);
        parts.push(`已测=${Math.trunc(tested)}${total > 0 ? '/' + total : ''}`);
      }
      const err = String(status.error || '').trim();
      if (err) parts.push(`错误=${escapeHTML(err)}`);
      return parts.join(' ');
    }

    function renderProxyLinkStatusRows(items) {
      proxyLinkStatusRowsEl.innerHTML = '';
      const rows = Array.isArray(items) ? items : [];
      if (rows.length === 0) {
        proxyLinkStatusRowsEl.innerHTML = '<tr><td colspan="3" class="muted">暂无链路状态</td></tr>';
        return;
      }
      rows.forEach((item) => {
        const tr = document.createElement('tr');
        const chainID = normalizeChainID(item && item.chain_id);
        const chainName = String(item && item.chain_name || '').trim() || chainID || '-';
        const route = Array.isArray(item && item.route) ? item.route.join(' → ') : '';
        const endpoint = String(item && item.endpoint || '').trim() || [item && item.entry_host, item && item.entry_port].filter(Boolean).join(':') || '-';
        const protocolText = formatProtocolQualities(item && item.protocol_state);
        const rate = Number(item && item.observed_rate_bps);
        const errorText = String(item && item.unavailable_error || '').trim();
        const cfOptimizeHTML = formatCFOptimizeStatusHTML(item && item.cf_optimize, item);
        const cfButton = isCFProxyLinkItem(item) ? `<button class="secondary" data-action="cf-ip-optimize" data-chain-id="${escapeHTML(chainID)}">CF IP优选</button>` : '';
        tr.innerHTML = `
          <td><strong>${escapeHTML(chainName)}</strong><br><span class="muted">${escapeHTML(chainID || '-')}</span><br><span class="muted">入口: ${escapeHTML(endpoint)}</span><br><span class="muted">配置协议: ${escapeHTML(formatRelayProtocolLabel(item && item.link_layer))}</span>${route ? `<br><span class="muted">${escapeHTML(route)}</span>` : ''}</td>
          <td>
            <div class="link-info">
              <div class="link-info-line"><span class="muted">状态</span><span class="${linkStatusClass(item && item.status)}">${escapeHTML(formatLinkStatusText(item))}${errorText ? `<br><span class="muted">${escapeHTML(errorText)}</span>` : ''}${cfOptimizeHTML ? `<br><span class="muted">CF优选: ${cfOptimizeHTML}</span>` : ''}</span></div>
              <div class="link-info-line"><span class="muted">质量</span><span class="pre-line">${escapeHTML(protocolText)}</span></div>
              <div class="link-info-line"><span class="muted">测速</span><span>${escapeHTML(formatRateText(rate))}</span></div>
            </div>
          </td>
          <td><div class="mini-actions"><button class="secondary" data-action="latency" data-chain-id="${escapeHTML(chainID)}">延迟</button><button class="secondary" data-action="speed" data-protocol="http2" data-chain-id="${escapeHTML(chainID)}">HTTP/2 测速</button><button class="secondary" data-action="speed" data-protocol="http3" data-chain-id="${escapeHTML(chainID)}">HTTP/3 测速</button>${cfButton}</div></td>
        `;
        proxyLinkStatusRowsEl.appendChild(tr);
      });
    }

    function escapeHTML(value) {
      return String(value === undefined || value === null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    async function loadProxyStatus() {
      const data = await requestJSON('/local/api/proxy/status', { method: 'GET' });
      proxyStatusCache = {
        enabled: !!data.enabled,
        mode: String(data.mode || '').trim(),
      };
      setText('proxyEnabled', data.enabled ? '是' : '否');
      setText('proxyMode', data.mode);
      setText('proxyLastError', data.last_error);
      updateProxyGlobalToggleButton();
    }

    function resolveConfiguredProxyGroups(groupsData) {
      const configuredGroups = Array.isArray(groupsData && groupsData.groups)
        ? groupsData.groups.map((item) => String(item && item.group || '').trim()).filter(Boolean)
        : [];
      const nonFallbackGroups = configuredGroups
        .map((name) => name.trim())
        .filter((name) => name && name.toLowerCase() !== 'fallback');
      const uniqueGroups = [...new Set(nonFallbackGroups)];
      uniqueGroups.push('fallback');
      return uniqueGroups;
    }

    function applyProxySelectionData(groupsData, chainsData, stateData) {
      const uniqueGroups = resolveConfiguredProxyGroups(groupsData || {});
      if (chainsData) {
        proxyChainItemsCache = Array.isArray(chainsData.items) ? chainsData.items : [];
      }
      proxyStateGroupsCache = Array.isArray(stateData && stateData.groups) ? stateData.groups : [];
      updateProxyGroupBackupStatus(stateData && stateData.backup);
      renderProxyRuleGroupRows(uniqueGroups);
    }

    async function loadProxySelections() {
      const [groupsData, chainsData, stateData] = await Promise.all([
        requestJSON('/local/api/proxy/groups', { method: 'GET' }),
        requestJSON('/local/api/proxy/chains', { method: 'GET' }),
        requestJSON('/local/api/proxy/state', { method: 'GET' }),
      ]);
      applyProxySelectionData(groupsData, chainsData, stateData);
    }

    async function loadProxyGroupsOnly() {
      const [groupsData, stateData] = await Promise.all([
        requestJSON('/local/api/proxy/groups', { method: 'GET' }),
        requestJSON('/local/api/proxy/state', { method: 'GET' }),
      ]);
      applyProxySelectionData(groupsData, null, stateData);
    }

    async function loadProxyLinkStatus() {
      const data = await requestJSON('/local/api/proxy/link/status', { method: 'GET' });
      proxyLinkStatusCache = Array.isArray(data && data.items) ? data.items : [];
      renderProxyLinkStatusRows(proxyLinkStatusCache);
    }

    async function runProxyLinkLatency(chainID) {
      const cleanID = normalizeChainID(chainID);
      if (!cleanID) return;
      setMessage(`链路 ${cleanID} 延迟探测中...`);
      try {
        const data = await requestJSON('/local/api/proxy/link/latency', {
          method: 'POST',
          body: JSON.stringify({ chain_id: cleanID }),
        }, 30000);
        await loadProxyLinkStatus();
        if (data && data.ok) {
          setMessage(`链路 ${cleanID} 可达，延迟 ${Math.trunc(Number(data.latency_ms) || 0)}ms`, 'success');
          return;
        }
        setMessage(`链路 ${cleanID} 不可达：${String(data && data.error || data && data.status || 'unknown')}`, 'error');
      } catch (err) {
        setMessage(`链路 ${cleanID} 延迟探测失败：${err.message}`, 'error');
      }
    }

    async function runProxyLinkSpeed(chainID, protocol) {
      const cleanID = normalizeChainID(chainID);
      const cleanProtocol = String(protocol || '').trim().toLowerCase();
      const protocolLabel = formatRelayProtocolLabel(cleanProtocol);
      if (!cleanID) return;
      setMessage(`链路 ${cleanID} ${protocolLabel} 真实测速中...`);
      try {
        const data = await requestJSON('/local/api/proxy/link/speed', {
          method: 'POST',
          body: JSON.stringify({ chain_id: cleanID, protocol: cleanProtocol }),
        }, 75000);
        await loadProxyLinkStatus();
        const rate = formatRateText(Number(data && data.rate_bps));
        const results = Array.isArray(data && data.results) ? data.results : [];
        const okCount = results.filter((item) => item && item.ok).length;
        if (okCount > 0) {
          setMessage(`链路 ${cleanID} ${protocolLabel} 测速完成：${rate}`, 'success');
          return;
        }
        setMessage(`链路 ${cleanID} ${protocolLabel} 测速不可达：${String(data && data.status || data && data.error || 'unknown')}`, 'error');
      } catch (err) {
        setMessage(`链路 ${cleanID} ${protocolLabel} 测速失败：${err.message}`, 'error');
      }
    }

    async function runProxyLinkCFIPOptimize(chainID) {
      const cleanID = normalizeChainID(chainID);
      if (!cleanID) return;
      setMessage(`链路 ${cleanID} CF IP 优选已提交，后台测试 HTTP/3 / HTTP/2 延迟...`);
      try {
        const data = await requestJSON('/local/api/proxy/link/cf_ip_optimize', {
          method: 'POST',
          body: JSON.stringify({ chain_id: cleanID }),
        }, 10000);
        await loadProxyLinkStatus();
        if (data && data.ok) {
          setMessage(data.accepted === false ? `链路 ${cleanID} CF IP 优选已在运行` : `链路 ${cleanID} CF IP 优选已进入后台`, 'success');
          pollProxyLinkStatusUntilCFOptimizeDone(cleanID);
          return;
        }
        setMessage(`链路 ${cleanID} CF IP 优选提交失败：${String(data && data.error || data && data.status || 'unknown')}`, 'error');
      } catch (err) {
        setMessage(`链路 ${cleanID} CF IP 优选失败：${err.message}`, 'error');
      }
    }

    function pollProxyLinkStatusUntilCFOptimizeDone(chainID) {
      const cleanID = normalizeChainID(chainID);
      let attempts = 0;
      const timer = setInterval(async () => {
        attempts += 1;
        try {
          await loadProxyLinkStatus();
          const item = proxyLinkStatusCache.find((row) => normalizeChainID(row && row.chain_id) === cleanID);
          const cfStatus = item && item.cf_optimize ? item.cf_optimize : {};
          if (!cfStatus.running || attempts >= 60) {
            clearInterval(timer);
          }
        } catch (_) {
          if (attempts >= 3) clearInterval(timer);
        }
      }, 2000);
    }

    async function copyTextToClipboard(text) {
      const value = String(text || '').trim();
      if (!value) return false;
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(value);
        return true;
      }
      const textarea = document.createElement('textarea');
      textarea.value = value;
      textarea.setAttribute('readonly', 'readonly');
      textarea.style.position = 'fixed';
      textarea.style.left = '-9999px';
      document.body.appendChild(textarea);
      textarea.select();
      let ok = false;
      try {
        ok = document.execCommand('copy');
      } finally {
        document.body.removeChild(textarea);
      }
      return ok;
    }

    async function copyCFOptimizeIP(target) {
      if (!target) return;
      const dns = String(target.getAttribute('data-copy-cf-dns') || '').trim();
      const ip = String(target.getAttribute('data-copy-cf-ip') || '').trim();
      if (!ip) return;
      const text = dns ? `${dns},${ip}` : ip;
      try {
        const ok = await copyTextToClipboard(text);
        setMessage(ok ? `已复制：${text}` : `复制失败：${text}`, ok ? 'success' : 'error');
      } catch (err) {
        setMessage(`复制失败：${err.message}`, 'error');
      }
    }

    async function triggerProxyRuntimeRefresh(options = {}) {
      if (proxyRuntimeRefreshInFlight) {
        return;
      }
      proxyRuntimeRefreshInFlight = true;
      try {
        const data = await requestJSON('/local/api/proxy/status/refresh', { method: 'POST', body: '{}' }, 5000);
        if (!options.silent) {
          const refresh = data && data.refresh ? data.refresh : {};
          setMessage(refresh.already_running ? '代理状态刷新已在后台运行，先展示缓存数据' : '代理状态刷新已提交，先展示缓存数据', 'success');
        }
        setTimeout(() => {
          loadProxySelections().catch(() => {
          });
        }, 1200);
      } catch (err) {
        if (!options.silent) {
          setMessage('提交代理状态刷新失败：' + err.message, 'error');
        }
      } finally {
        proxyRuntimeRefreshInFlight = false;
      }
    }

    function resolveGlobalToggleEnableSelection() {
      const preferred = proxyStateGroupsCache.find((entry) => {
        return normalizeAction(entry && entry.action) === 'tunnel'
          && normalizeChainID(entry && entry.tunnel_node_id) !== '';
      });
      if (preferred) {
        const group = String(preferred && preferred.group || '').trim() || 'fallback';
        const chainID = normalizeChainID(preferred && preferred.tunnel_node_id);
        if (chainID) {
          return { group, chainID };
        }
      }
      const firstChain = proxyChainItemsCache.find((item) => normalizeChainID(item && item.chain_id));
      if (!firstChain) {
        return null;
      }
      return {
        group: 'fallback',
        chainID: normalizeChainID(firstChain.chain_id),
      };
    }

    function stopProxyStatusPolling() {
      if (proxyStatusPollingTimer) {
        clearInterval(proxyStatusPollingTimer);
        proxyStatusPollingTimer = null;
      }
    }

    function startProxyStatusPolling() {
      if (proxyStatusPollingTimer) return;
      proxyStatusPollingTimer = setInterval(() => {
        loadProxyStatus().catch(() => {
        });
      }, PROXY_STATUS_POLL_INTERVAL_MS);
    }

    async function refreshAll() {
      setMessage('');
      const ok = await ensureSession();
      if (!ok) return;
      await Promise.all([
        loadProxyStatus(),
        loadProxySelections(),
      ]);
      if (document.querySelector('.tab-btn[data-tab="links"].active')) {
        loadProxyLinkStatus().catch(() => {
        });
      }
      if (isProxyGloballyEnabled()) {
        triggerProxyRuntimeRefresh({ silent: true });
      }
    }

    function switchProxyTab(tabName) {
      const clean = String(tabName || '').trim() || 'groups';
      document.querySelectorAll('.tab-btn').forEach((btn) => {
        btn.classList.toggle('active', btn.getAttribute('data-tab') === clean);
      });
      document.querySelectorAll('.proxy-tab-panel').forEach((panel) => {
        panel.classList.toggle('active', panel.getAttribute('data-tab-panel') === clean);
      });
      if (clean === 'links') {
        loadProxyLinkStatus().catch((err) => setMessage('读取链路状态失败：' + err.message, 'error'));
      }
    }

    document.querySelectorAll('.tab-btn').forEach((btn) => {
      btn.addEventListener('click', () => switchProxyTab(btn.getAttribute('data-tab')));
    });

    document.getElementById('proxyLinkStatusRefreshBtn').addEventListener('click', async () => {
      setMessage('刷新链路状态...');
      try {
        await loadProxyLinkStatus();
        setMessage('链路状态已刷新', 'success');
      } catch (err) {
        setMessage('刷新链路状态失败：' + err.message, 'error');
      }
    });

    proxyLinkStatusRowsEl.addEventListener('click', (event) => {
      const copyTarget = event.target && event.target.closest ? event.target.closest('[data-copy-cf-ip]') : null;
      if (copyTarget) {
        copyCFOptimizeIP(copyTarget);
        return;
      }
      const btn = event.target && event.target.closest ? event.target.closest('button[data-action]') : null;
      if (!btn) return;
      const chainID = btn.getAttribute('data-chain-id') || '';
      const action = btn.getAttribute('data-action') || '';
      if (action === 'latency') {
        runProxyLinkLatency(chainID);
        return;
      }
      if (action === 'speed') {
        runProxyLinkSpeed(chainID, btn.getAttribute('data-protocol') || '');
        return;
      }
      if (action === 'cf-ip-optimize') {
        runProxyLinkCFIPOptimize(chainID);
      }
    });

    proxyLinkStatusRowsEl.addEventListener('keydown', (event) => {
      if (event.key !== 'Enter' && event.key !== ' ') return;
      const copyTarget = event.target && event.target.closest ? event.target.closest('[data-copy-cf-ip]') : null;
      if (!copyTarget) return;
      event.preventDefault();
      copyCFOptimizeIP(copyTarget);
    });

    document.getElementById('proxyRefreshBtn').addEventListener('click', async () => {
      setMessage('正在提交后台刷新，页面先展示已有状态...');
      try {
        await Promise.all([
          loadProxyStatus(),
          loadProxySelections(),
        ]);
        triggerProxyRuntimeRefresh({ silent: false });
      } catch (err) {
        setMessage('读取代理状态失败：' + err.message, 'error');
      }
    });

    document.getElementById('proxyGroupRefreshBtn').addEventListener('click', async () => {
      setMessage('刷新本地代理组并清空 DNS / Fake IP 缓存...');
      try {
        await requestJSON('/local/api/proxy/groups/refresh', { method: 'POST', body: '{}' });
        await loadProxyGroupsOnly();
        setMessage('代理组已刷新，DNS / Fake IP 缓存已清空', 'success');
      } catch (err) {
        setMessage('刷新代理组失败：' + err.message, 'error');
      }
    });

    document.getElementById('proxyChainRefreshBtn').addEventListener('click', async () => {
      setMessage('从主控刷新链路...');
      try {
        await requestJSON('/local/api/proxy/chains/refresh', { method: 'POST', body: '{}' });
        await loadProxySelections();
        if (document.querySelector('.tab-btn[data-tab="links"].active')) {
          await loadProxyLinkStatus();
        }
        setMessage('链路已刷新', 'success');
      } catch (err) {
        setMessage('刷新链路失败：' + err.message, 'error');
      }
    });

    document.getElementById('proxyGroupBackupBtn').addEventListener('click', async () => {
      setMessage('备份代理规则组到主控...');
      try {
        await requestJSON('/local/api/proxy/groups/backup', { method: 'POST', body: '{}' }, 30000);
        await loadProxySelections();
        setMessage('代理规则组已备份到主控', 'success');
      } catch (err) {
        setMessage('备份代理规则组失败：' + err.message, 'error');
      }
    });

    document.getElementById('proxyGroupRestoreBtn').addEventListener('click', async () => {
      setMessage('从主控恢复代理规则组...');
      try {
        await requestJSON('/local/api/proxy/groups/restore', { method: 'POST', body: '{}' }, 30000);
        await loadProxySelections();
        setMessage('代理规则组已从主控恢复', 'success');
      } catch (err) {
        setMessage('恢复代理规则组失败：' + err.message, 'error');
      }
    });

    document.getElementById('proxyGlobalToggleBtn').addEventListener('click', async () => {
      if (isProxyGloballyEnabled()) {
        setMessage('关闭代理中...');
        try {
          await requestJSON('/local/api/proxy/direct', {
            method: 'POST',
            body: JSON.stringify({ group: 'fallback' }),
          });
          await refreshAll();
          setMessage('代理已关闭', 'success');
        } catch (err) {
          setMessage('关闭代理失败：' + err.message, 'error');
        }
        return;
      }
      const selection = resolveGlobalToggleEnableSelection();
      if (!selection || !selection.chainID) {
        setMessage('启用代理失败：请先配置可用链路', 'error');
        return;
      }
      setMessage('启用代理中...');
      try {
        await requestJSON('/local/api/proxy/enable', {
          method: 'POST',
          body: JSON.stringify({
            group: selection.group,
            tunnel_node_id: selection.chainID,
          }),
        });
        await refreshAll();
        setMessage('代理已启用', 'success');
      } catch (err) {
        setMessage('启用代理失败：' + err.message, 'error');
      }
    });

    startProxyStatusPolling();
    refreshAll().catch((err) => setMessage('初始化失败：' + err.message, 'error'));
    window.addEventListener('beforeunload', () => stopProxyStatusPolling());
  </script>
</body>
</html>
