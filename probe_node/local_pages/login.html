<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Probe Node 本地控制台登录</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 24px; color: #1f2937; }
    main { max-width: 560px; margin: 0 auto; }
    h1 { margin-bottom: 8px; }
    .card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; margin-top: 16px; }
    .row { display: flex; flex-direction: column; margin-bottom: 12px; }
    label { font-size: 14px; margin-bottom: 4px; }
    input { padding: 8px; border: 1px solid #d1d5db; border-radius: 6px; }
    button { padding: 8px 12px; border: 0; border-radius: 6px; cursor: pointer; background: #2563eb; color: #fff; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .hint { font-size: 13px; color: #6b7280; }
    .msg { margin-top: 12px; min-height: 20px; font-size: 14px; }
    .msg.error { color: #b91c1c; }
    .msg.success { color: #166534; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <main>
    <h1>Probe Node 本地控制台</h1>
    <p class="hint">首次登录需要先注册账号，仅允许注册一次。</p>

    <section id="registerCard" class="card hidden">
      <h2>首次注册</h2>
      <form id="registerForm">
        <div class="row">
          <label for="registerUsername">用户名</label>
          <input id="registerUsername" name="username" required maxlength="64" />
        </div>
        <div class="row">
          <label for="registerPassword">密码（至少 8 位）</label>
          <input id="registerPassword" name="password" type="password" required minlength="8" maxlength="128" />
        </div>
        <div class="row">
          <label for="registerConfirmPassword">确认密码</label>
          <input id="registerConfirmPassword" name="confirm_password" type="password" required minlength="8" maxlength="128" />
        </div>
        <button id="registerBtn" type="submit">注册</button>
      </form>
    </section>

    <section class="card">
      <h2>登录</h2>
      <form id="loginForm">
        <div class="row">
          <label for="loginUsername">用户名</label>
          <input id="loginUsername" name="username" required maxlength="64" />
        </div>
        <div class="row">
          <label for="loginPassword">密码</label>
          <input id="loginPassword" name="password" type="password" required maxlength="128" />
        </div>
        <button id="loginBtn" type="submit">登录</button>
      </form>
    </section>

    <p id="message" class="msg"></p>
  </main>

  <script>
    const messageEl = document.getElementById('message');
    const registerCard = document.getElementById('registerCard');
    const registerForm = document.getElementById('registerForm');
    const loginForm = document.getElementById('loginForm');

    function setMessage(text, type) {
      messageEl.textContent = text || '';
      messageEl.className = 'msg' + (type ? ' ' + type : '');
    }

    async function requestJSON(url, options) {
      const res = await fetch(url, {
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        ...options,
      });
      let data = {};
      try {
        data = await res.json();
      } catch (_) {
        data = {};
      }
      if (!res.ok) {
        const msg = (data && data.error) ? data.error : ('HTTP ' + res.status);
        throw new Error(msg);
      }
      return data;
    }

    async function loadBootstrap() {
      setMessage('');
      try {
        const data = await requestJSON('/local/api/auth/bootstrap', { method: 'GET' });
        const registered = !!data.registered;
        if (!registered) {
          registerCard.classList.remove('hidden');
          setMessage('检测到未注册，请先完成首次注册。');
        } else {
          registerCard.classList.add('hidden');
        }
      } catch (err) {
        setMessage('加载初始化状态失败：' + err.message, 'error');
      }
    }

    registerForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const registerBtn = document.getElementById('registerBtn');
      registerBtn.disabled = true;
      setMessage('注册中...');
      try {
        const payload = {
          username: document.getElementById('registerUsername').value,
          password: document.getElementById('registerPassword').value,
          confirm_password: document.getElementById('registerConfirmPassword').value,
        };
        await requestJSON('/local/api/auth/register', {
          method: 'POST',
          body: JSON.stringify(payload),
        });
        registerCard.classList.add('hidden');
        document.getElementById('loginUsername').value = payload.username;
        setMessage('注册成功，请立即登录。', 'success');
      } catch (err) {
        setMessage('注册失败：' + err.message, 'error');
      } finally {
        registerBtn.disabled = false;
      }
    });

    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const loginBtn = document.getElementById('loginBtn');
      loginBtn.disabled = true;
      setMessage('登录中...');
      try {
        const payload = {
          username: document.getElementById('loginUsername').value,
          password: document.getElementById('loginPassword').value,
        };
        await requestJSON('/local/api/auth/login', {
          method: 'POST',
          body: JSON.stringify(payload),
        });
        window.location.href = '/local/panel';
      } catch (err) {
        setMessage('登录失败：' + err.message, 'error');
        loginBtn.disabled = false;
      }
    });

    loadBootstrap();
  </script>
</body>
</html>
