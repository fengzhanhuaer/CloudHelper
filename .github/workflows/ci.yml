name: CI

on:
  push:
    branches:
      - main
      - mapledev
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Ref to build
        required: false
        default: mapledev

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - probe_node
          - probe_controller
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
      - name: Build ${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: go build ./...
