<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CloudHelper 系统设置</title>
  <style>
    :root { color-scheme: dark; }
    body { margin:0; font-family:Segoe UI,Roboto,Arial,sans-serif; background:#0d1117; color:#c9d1d9; }
    .wrap { max-width:860px; margin:5vh auto; padding:20px; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:14px; }
    h1 { margin:0; font-size:24px; }
    .btn { padding:9px 14px; border-radius:8px; border:1px solid #30363d; background:#21262d; color:#c9d1d9; cursor:pointer; }
    .btn.primary { background:#1f6feb; border-color:#2f81f7; color:#fff; }
    .btn:disabled { opacity:.6; cursor:not-allowed; }
    .panel { border:1px solid #30363d; background:#161b22; border-radius:12px; padding:16px; }
    .muted { color:#8b949e; font-size:13px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:10px; margin:14px 0; }
    .item { border:1px solid #30363d; border-radius:10px; background:#0d1117; padding:12px; }
    .label { color:#8b949e; font-size:12px; text-transform:uppercase; }
    .value { margin-top:6px; font-size:20px; font-family:Consolas,monospace; }
    .actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:10px; }
    .status { margin-top:12px; border-radius:8px; background:#0d1117; border:1px solid #30363d; padding:10px; font-size:13px; white-space:pre-wrap; }
    .ok { color:#7ee787; }
    .warn { color:#f2cc60; }
    .err { color:#ff7b72; }
    .panel + .panel { margin-top:16px; }
    .list { display:flex; flex-direction:column; gap:10px; margin-top:14px; }
    .row { display:grid; grid-template-columns:minmax(0,1fr) minmax(220px,320px) auto auto; gap:10px; align-items:center; border:1px solid #30363d; border-radius:10px; background:#0d1117; padding:12px; }
    .cidr { font-family:Consolas,monospace; font-size:15px; word-break:break-all; }
    .input { width:100%; box-sizing:border-box; padding:9px 10px; border-radius:8px; border:1px solid #30363d; background:#161b22; color:#c9d1d9; }
    .empty { color:#8b949e; border:1px dashed #30363d; border-radius:10px; padding:14px; margin-top:14px; }
    @media (max-width: 860px) {
      .row { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1>/mng/settings</h1>
      <div>
        <button id="btn-back" class="btn" type="button">返回磁贴面板</button>
        <button id="btn-logout" class="btn" type="button">退出登录</button>
      </div>
    </div>

    <div class="panel">
      <p class="muted">系统设置页包含版本检查与主控升级。升级触发后前端将进入延时重连流程。</p>

      <div class="grid">
        <div class="item">
          <div class="label">当前版本</div>
          <div class="value" id="current-version">--</div>
        </div>
        <div class="item">
          <div class="label">最新版本</div>
          <div class="value" id="latest-version">--</div>
        </div>
        <div class="item">
          <div class="label">可升级</div>
          <div class="value" id="upgrade-available">--</div>
        </div>
      </div>

      <div class="actions">
        <button id="btn-check-update" class="btn" type="button">检查更新</button>
        <button id="btn-upgrade" class="btn primary" type="button">主控升级</button>
      </div>

      <div class="status" id="status-box">尚未执行操作。</div>
    </div>

    <div class="panel">
      <p class="muted">CIDR 黑名单用于拒绝 `/api/auth/nonce` 与 `/api/auth/login` 来源。可在这里查看、修改与删除。</p>
      <div class="actions">
        <button id="btn-refresh-blacklist" class="btn" type="button">刷新黑名单</button>
      </div>
      <div id="blacklist-empty" class="empty" style="display:none;">当前没有黑名单 CIDR。</div>
      <div id="blacklist-list" class="list"></div>
    </div>
  </div>

  <script>
    const statusBox = document.getElementById('status-box');
    const checkBtn = document.getElementById('btn-check-update');
    const upgradeBtn = document.getElementById('btn-upgrade');
    const blacklistList = document.getElementById('blacklist-list');
    const blacklistEmpty = document.getElementById('blacklist-empty');
    const refreshBlacklistBtn = document.getElementById('btn-refresh-blacklist');
    let progressTimer = null;

    function setStatus(text, level) {
      statusBox.textContent = text;
      statusBox.className = 'status';
      if (level) {
        statusBox.classList.add(level);
      }
    }

    function setBusy(busy) {
      checkBtn.disabled = busy;
      upgradeBtn.disabled = busy;
    }

    async function requestJSON(url, options) {
      const res = await fetch(url, {
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        ...options,
      });
      if (res.status === 401) {
        location.href = '/mng';
        return null;
      }
      const data = await res.json();
      if (!res.ok) {
        throw new Error(data.error || ('HTTP ' + res.status));
      }
      return data;
    }

    async function ensureSession() {
      const res = await fetch('/mng/api/session', { credentials: 'same-origin' });
      const data = await res.json();
      if (!res.ok || !data.authenticated) {
        location.href = '/mng';
        return false;
      }
      return true;
    }

    async function checkUpdate() {
      setStatus('正在检查最新版本...', 'warn');
      const data = await requestJSON('/mng/api/system/version', { method: 'GET' });
      if (!data) {
        return;
      }
      document.getElementById('current-version').textContent = data.current_version || 'dev';
      document.getElementById('latest-version').textContent = data.latest_version || '--';
      document.getElementById('upgrade-available').textContent = data.upgrade_available ? '是' : '否';

      const msg = data.message ? String(data.message) : '';
      if (msg) {
        setStatus('检查完成：' + msg, data.upgrade_available ? 'ok' : 'warn');
      } else {
        setStatus('检查完成。当前版本：' + (data.current_version || '--') + '，最新版本：' + (data.latest_version || '--'), data.upgrade_available ? 'ok' : 'warn');
      }
    }

    async function readUpgradeProgress() {
      return requestJSON('/mng/api/system/upgrade/progress', { method: 'GET' });
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function startDelayedReconnect() {
      setStatus('升级任务已提交，等待服务重启中...\n将延时后开始重连检测。', 'warn');
      await sleep(7000);

      for (let attempt = 1; attempt <= 60; attempt++) {
        try {
          const res = await fetch('/mng/api/system/reconnect/check?ts=' + Date.now(), {
            cache: 'no-store',
            credentials: 'omit',
          });
          if (res.ok) {
            setStatus('服务已恢复，正在跳转登录页重新建立会话...', 'ok');
            await sleep(900);
            location.href = '/mng';
            return;
          }
        } catch (_) {
          // ignore and retry
        }
        setStatus('等待服务恢复中，重连检测第 ' + attempt + ' 次...', 'warn');
        await sleep(2000);
      }

      setStatus('重连检测超时，请稍后手动重新访问 /mng。', 'err');
      setBusy(false);
      if (progressTimer) {
        clearInterval(progressTimer);
        progressTimer = null;
      }
    }

    async function triggerUpgrade() {
      setBusy(true);
      setStatus('正在触发主控升级...', 'warn');

      const data = await requestJSON('/mng/api/system/upgrade', {
        method: 'POST',
      });
      if (!data) {
        return;
      }

      const accepted = !!data.accepted;
      const message = data.message ? String(data.message) : 'upgrade request accepted';
      setStatus('升级接口返回：' + message, accepted ? 'ok' : 'warn');

      if (progressTimer) {
        clearInterval(progressTimer);
      }
      progressTimer = setInterval(async () => {
        const progress = await readUpgradeProgress();
        if (!progress) {
          return;
        }
        const text = '升级阶段：' + (progress.phase || '-')
          + '\n进度：' + String(progress.percent || 0) + '%'
          + '\n信息：' + (progress.message || '-');
        setStatus(text, progress.active ? 'warn' : 'ok');
      }, 1500);

      startDelayedReconnect();
    }

    async function logout() {
      await fetch('/mng/api/logout', { method: 'POST', credentials: 'same-origin' });
      location.href = '/mng';
    }

    function renderBlacklist(items) {
      const cidrs = Array.isArray(items) ? items : [];
      blacklistList.innerHTML = '';
      blacklistEmpty.style.display = cidrs.length ? 'none' : 'block';
      cidrs.forEach((cidr) => {
        const row = document.createElement('div');
        row.className = 'row';

        const cidrEl = document.createElement('div');
        cidrEl.className = 'cidr';
        cidrEl.textContent = cidr;
        row.appendChild(cidrEl);

        const input = document.createElement('input');
        input.className = 'input';
        input.type = 'text';
        input.value = cidr;
        row.appendChild(input);

        const updateBtn = document.createElement('button');
        updateBtn.className = 'btn';
        updateBtn.type = 'button';
        updateBtn.textContent = '修改';
        updateBtn.addEventListener('click', async () => {
          const newCIDR = input.value.trim();
          if (!newCIDR) {
            setStatus('修改失败：CIDR 不能为空', 'err');
            return;
          }
          try {
            const data = await requestJSON('/mng/api/system/blacklist/update', {
              method: 'POST',
              body: JSON.stringify({ old_cidr: cidr, new_cidr: newCIDR }),
            });
            if (!data) return;
            renderBlacklist(data.items);
            setStatus('黑名单已修改：' + cidr + ' -> ' + newCIDR, 'ok');
          } catch (err) {
            setStatus('修改黑名单失败：' + err.message, 'err');
          }
        });
        row.appendChild(updateBtn);

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'btn';
        deleteBtn.type = 'button';
        deleteBtn.textContent = '删除';
        deleteBtn.addEventListener('click', async () => {
          try {
            const data = await requestJSON('/mng/api/system/blacklist/delete', {
              method: 'POST',
              body: JSON.stringify({ cidr }),
            });
            if (!data) return;
            renderBlacklist(data.items);
            setStatus('黑名单已删除：' + cidr, 'ok');
          } catch (err) {
            setStatus('删除黑名单失败：' + err.message, 'err');
          }
        });
        row.appendChild(deleteBtn);

        blacklistList.appendChild(row);
      });
    }

    async function loadBlacklist() {
      const data = await requestJSON('/mng/api/system/blacklist', { method: 'GET' });
      if (!data) return;
      renderBlacklist(data.items);
    }

    document.getElementById('btn-back').addEventListener('click', () => { location.href = '/mng/panel'; });
    document.getElementById('btn-logout').addEventListener('click', () => { logout().catch(() => { location.href = '/mng'; }); });
    checkBtn.addEventListener('click', () => { checkUpdate().catch(err => setStatus('检查更新失败：' + (err && err.message ? err.message : 'unknown'), 'err')); });
    upgradeBtn.addEventListener('click', () => { triggerUpgrade().catch(err => { setBusy(false); setStatus('升级失败：' + (err && err.message ? err.message : 'unknown'), 'err'); }); });
    refreshBlacklistBtn.addEventListener('click', () => { loadBlacklist().then(() => setStatus('黑名单已刷新', 'ok')).catch(err => setStatus('刷新黑名单失败：' + (err && err.message ? err.message : 'unknown'), 'err')); });

    ensureSession().then(ok => {
      if (!ok) return;
      checkUpdate().catch(() => {
        setStatus('初始化版本检查失败，可手动点击“检查更新”重试。', 'warn');
      });
      loadBlacklist().catch(() => {
        setStatus('黑名单加载失败，可手动点击“刷新黑名单”重试。', 'warn');
      });
    });
  </script>
</body>
</html>
