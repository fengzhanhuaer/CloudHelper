<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Probe Node 本地控制台</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 24px; color: #1f2937; }
    main { max-width: 860px; margin: 0 auto; }
    h1 { margin-bottom: 8px; }
    .hint { color: #6b7280; font-size: 13px; }
    .card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; margin-top: 14px; }
    .tabs { display: flex; gap: 8px; margin-top: 14px; }
    .tab-btn { background: #e5e7eb; color: #1f2937; border: 0; border-radius: 6px; padding: 8px 12px; cursor: pointer; }
    .tab-btn.active { background: #2563eb; color: #fff; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    button { padding: 8px 12px; border: 0; border-radius: 6px; cursor: pointer; background: #2563eb; color: #fff; }
    button.secondary { background: #4b5563; }
    button.warn { background: #b91c1c; }
    .kv { display: grid; grid-template-columns: 170px 1fr; row-gap: 6px; column-gap: 8px; margin-top: 8px; font-size: 14px; }
    .field { display: flex; flex-direction: column; gap: 4px; font-size: 13px; color: #374151; }
    .field select { min-width: 220px; padding: 7px 8px; border: 1px solid #d1d5db; border-radius: 6px; background: #fff; color: #111827; }
    .msg { margin-top: 14px; min-height: 20px; font-size: 14px; }
    .msg.error { color: #b91c1c; }
    .msg.success { color: #166534; }
    code { background: #f3f4f6; padding: 1px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <main>
    <h1>Probe Node 本地控制台</h1>
    <p class="hint">当前页面用于本地 TUN 驱动准备与代理接管切换。</p>

    <section class="card">
      <div class="actions">
        <button id="refreshAllBtn" class="secondary">刷新全部状态</button>
        <button id="logoutBtn" class="warn">退出登录</button>
      </div>
    </section>

    <div class="tabs">
      <button id="tabProxy" class="tab-btn active" data-target="panelProxy">代理状态</button>
      <button id="tabTun" class="tab-btn" data-target="panelTun">TUN 状态</button>
    </div>

    <section id="panelProxy" class="card tab-panel active">
      <strong>代理状态</strong>
      <div class="kv">
        <div>接管开关</div><div id="proxyEnabled">-</div>
        <div>当前模式</div><div id="proxyMode">-</div>
        <div>当前生效组</div><div id="proxyActiveGroup">-</div>
        <div>当前生效链路</div><div id="proxyActiveTunnel">-</div>
        <div>最后更新时间</div><div id="proxyUpdatedAt">-</div>
        <div>最近错误</div><div id="proxyLastError">-</div>
      </div>
      <div class="actions">
        <label class="field" for="proxyGroupSelect">
          <span>代理组</span>
          <select id="proxyGroupSelect"></select>
        </label>
        <label class="field" for="proxyChainSelect">
          <span>代理链路</span>
          <select id="proxyChainSelect"></select>
        </label>
      </div>
      <div class="actions">
        <button id="proxyEnableBtn">按选择启用 TUN 接管</button>
        <button id="proxyDirectBtn" class="secondary">按选择切回直连</button>
        <button id="proxyRefreshBtn" class="secondary">刷新代理状态</button>
        <button id="proxySelectionRefreshBtn" class="secondary">刷新组与链路</button>
      </div>
      <p class="hint">模式值：<code>direct</code> 表示直连，<code>tunnel</code> 表示已接管。<code>tunnel_node_id</code> 将写入运行态文件。</p>
    </section>

    <section id="panelTun" class="card tab-panel">
      <strong>TUN 状态</strong>
      <div class="kv">
        <div>平台</div><div id="tunPlatform">-</div>
        <div>已安装</div><div id="tunInstalled">-</div>
        <div>已启用</div><div id="tunEnabled">-</div>
        <div>最后更新时间</div><div id="tunUpdatedAt">-</div>
        <div>最近错误</div><div id="tunLastError">-</div>
      </div>
      <div class="actions">
        <button id="tunInstallBtn">安装/检查 TUN</button>
        <button id="tunRefreshBtn" class="secondary">刷新 TUN 状态</button>
      </div>
    </section>

    <p id="message" class="msg"></p>
  </main>

  <script>
    const messageEl = document.getElementById('message');
    const proxyGroupSelectEl = document.getElementById('proxyGroupSelect');
    const proxyChainSelectEl = document.getElementById('proxyChainSelect');
    let proxyStateGroupsCache = [];

    function setMessage(text, type) {
      messageEl.textContent = text || '';
      messageEl.className = 'msg' + (type ? ' ' + type : '');
    }

    function setText(id, value) {
      const el = document.getElementById(id);
      if (!el) return;
      const clean = (value === undefined || value === null || value === '') ? '-' : String(value);
      el.textContent = clean;
    }

    function normalizeChainID(chainValue) {
      const text = String(chainValue || '').trim();
      if (!text) return '';
      if (text.toLowerCase().startsWith('chain:')) {
        return text.slice('chain:'.length).trim();
      }
      return text;
    }

    function setSelectOptions(selectEl, options, selectedValue) {
      if (!selectEl) return;
      const keepValue = (selectedValue === undefined || selectedValue === null) ? '' : String(selectedValue);
      selectEl.innerHTML = '';
      options.forEach((opt) => {
        const optionEl = document.createElement('option');
        optionEl.value = String(opt.value);
        optionEl.textContent = String(opt.label);
        if (optionEl.value === keepValue) {
          optionEl.selected = true;
        }
        selectEl.appendChild(optionEl);
      });
      if (!Array.from(selectEl.options).some((opt) => opt.value === keepValue) && selectEl.options.length > 0) {
        selectEl.options[0].selected = true;
      }
    }

    function updateProxyActiveFromState() {
      const active = proxyStateGroupsCache.find((item) => String(item && item.action || '').trim().toLowerCase() === 'tunnel');
      setText('proxyActiveGroup', active && active.group);
      setText('proxyActiveTunnel', active && active.tunnel_node_id);
    }

    function switchTab(targetId) {
      document.querySelectorAll('.tab-btn').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.target === targetId);
      });
      document.querySelectorAll('.tab-panel').forEach((panel) => {
        panel.classList.toggle('active', panel.id === targetId);
      });
    }

    async function requestJSON(url, options) {
      const res = await fetch(url, {
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        ...options,
      });
      let data = {};
      try {
        data = await res.json();
      } catch (_) {
        data = {};
      }
      if (!res.ok) {
        const msg = (data && data.error) ? data.error : ('HTTP ' + res.status);
        const err = new Error(msg);
        err.status = res.status;
        throw err;
      }
      return data;
    }

    async function ensureSession() {
      try {
        const data = await requestJSON('/local/api/auth/session', { method: 'GET' });
        if (!data.authenticated) {
          window.location.href = '/local/login';
          return false;
        }
        return true;
      } catch (err) {
        if (err && err.status === 401) {
          window.location.href = '/local/login';
          return false;
        }
        throw err;
      }
    }

    async function loadTunStatus() {
      const data = await requestJSON('/local/api/tun/status', { method: 'GET' });
      setText('tunPlatform', data.platform);
      setText('tunInstalled', data.installed ? '是' : '否');
      setText('tunEnabled', data.enabled ? '是' : '否');
      setText('tunUpdatedAt', data.updated_at);
      setText('tunLastError', data.last_error);
    }

    async function loadProxyStatus() {
      const data = await requestJSON('/local/api/proxy/status', { method: 'GET' });
      setText('proxyEnabled', data.enabled ? '是' : '否');
      setText('proxyMode', data.mode);
      setText('proxyUpdatedAt', data.updated_at);
      setText('proxyLastError', data.last_error);
    }

    async function loadProxySelections() {
      const [groupsData, chainsData, stateData] = await Promise.all([
        requestJSON('/local/api/proxy/groups', { method: 'GET' }),
        requestJSON('/local/api/proxy/chains', { method: 'GET' }),
        requestJSON('/local/api/proxy/state', { method: 'GET' }),
      ]);

      const configuredGroups = Array.isArray(groupsData.groups)
        ? groupsData.groups.map((item) => String(item && item.group || '').trim()).filter(Boolean)
        : [];
      const allGroups = ['fallback', ...configuredGroups.filter((name) => name.toLowerCase() !== 'fallback')];
      const uniqueGroups = [...new Set(allGroups.map((name) => name.trim()).filter(Boolean))];

      const selectedGroup = (proxyGroupSelectEl && proxyGroupSelectEl.value) ? proxyGroupSelectEl.value : 'fallback';
      setSelectOptions(proxyGroupSelectEl, uniqueGroups.map((name) => ({ value: name, label: name })), selectedGroup);

      const chains = Array.isArray(chainsData.items) ? chainsData.items : [];
      const chainOptions = [{ value: '', label: '未指定（不绑定具体链路）' }].concat(
        chains.map((item) => {
          const chainID = String(item && item.chain_id || '').trim();
          const chainName = String(item && item.name || '').trim();
          const label = chainName ? `${chainName} (${chainID})` : chainID;
          return { value: chainID, label };
        }).filter((item) => item.value)
      );

      const stateGroups = Array.isArray(stateData.groups) ? stateData.groups : [];
      proxyStateGroupsCache = stateGroups;
      const selectedState = stateGroups.find((entry) => String(entry && entry.group || '').trim().toLowerCase() === String(proxyGroupSelectEl.value || '').trim().toLowerCase());
      const selectedChain = normalizeChainID(selectedState && selectedState.tunnel_node_id);
      const active = stateGroups.find((entry) => String(entry && entry.action || '').trim().toLowerCase() === 'tunnel');
      const activeChain = normalizeChainID(active && active.tunnel_node_id);
      setSelectOptions(proxyChainSelectEl, chainOptions, selectedChain || activeChain || '');
      updateProxyActiveFromState();
    }

    async function refreshAll() {
      setMessage('');
      const ok = await ensureSession();
      if (!ok) return;
      await loadProxyStatus();
      await loadProxySelections();
      await loadTunStatus();
    }

    document.querySelectorAll('.tab-btn').forEach((btn) => {
      btn.addEventListener('click', () => switchTab(btn.dataset.target));
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      setMessage('退出中...');
      try {
        await requestJSON('/local/api/auth/logout', { method: 'POST', body: '{}' });
      } catch (_) {
      }
      window.location.href = '/local/login';
    });

    document.getElementById('refreshAllBtn').addEventListener('click', async () => {
      setMessage('刷新中...');
      try {
        await refreshAll();
        setMessage('全部状态已刷新', 'success');
      } catch (err) {
        setMessage('刷新失败：' + err.message, 'error');
      }
    });

    document.getElementById('tunInstallBtn').addEventListener('click', async () => {
      setMessage('执行 TUN 安装/检查...');
      try {
        await requestJSON('/local/api/tun/install', { method: 'POST', body: '{}' });
        await refreshAll();
        setMessage('TUN 安装/检查完成', 'success');
      } catch (err) {
        setMessage('TUN 安装失败：' + err.message, 'error');
      }
    });

    document.getElementById('tunRefreshBtn').addEventListener('click', async () => {
      setMessage('刷新 TUN 状态...');
      try {
        await loadTunStatus();
        setMessage('TUN 状态已刷新', 'success');
      } catch (err) {
        setMessage('读取 TUN 状态失败：' + err.message, 'error');
      }
    });

    document.getElementById('proxyEnableBtn').addEventListener('click', async () => {
      setMessage('按选择启用 TUN 接管中...');
      try {
        const payload = {
          group: proxyGroupSelectEl.value || 'fallback',
          tunnel_node_id: proxyChainSelectEl.value || '',
        };
        await requestJSON('/local/api/proxy/enable', { method: 'POST', body: JSON.stringify(payload) });
        await refreshAll();
        setMessage('已按选择启用 TUN 接管', 'success');
      } catch (err) {
        setMessage('启用失败：' + err.message, 'error');
      }
    });

    document.getElementById('proxyDirectBtn').addEventListener('click', async () => {
      setMessage('按选择切换直连中...');
      try {
        const payload = {
          group: proxyGroupSelectEl.value || 'fallback',
        };
        await requestJSON('/local/api/proxy/direct', { method: 'POST', body: JSON.stringify(payload) });
        await refreshAll();
        setMessage('已按选择切回直连', 'success');
      } catch (err) {
        setMessage('切换直连失败：' + err.message, 'error');
      }
    });

    document.getElementById('proxyRefreshBtn').addEventListener('click', async () => {
      setMessage('刷新代理状态...');
      try {
        await loadProxyStatus();
        await loadProxySelections();
        setMessage('代理状态已刷新', 'success');
      } catch (err) {
        setMessage('读取代理状态失败：' + err.message, 'error');
      }
    });

    document.getElementById('proxySelectionRefreshBtn').addEventListener('click', async () => {
      setMessage('刷新代理组与链路...');
      try {
        await loadProxySelections();
        setMessage('代理组与链路已刷新', 'success');
      } catch (err) {
        setMessage('读取代理组与链路失败：' + err.message, 'error');
      }
    });

    proxyGroupSelectEl.addEventListener('change', () => {
      const stateEntry = proxyStateGroupsCache.find((entry) => {
        return String(entry && entry.group || '').trim().toLowerCase() === String(proxyGroupSelectEl.value || '').trim().toLowerCase();
      });
      const stateChain = normalizeChainID(stateEntry && stateEntry.tunnel_node_id);
      if (stateChain) {
        const hasOption = Array.from(proxyChainSelectEl.options).some((opt) => opt.value === stateChain);
        if (hasOption) {
          proxyChainSelectEl.value = stateChain;
        }
      }
    });

    refreshAll().catch((err) => setMessage('初始化失败：' + err.message, 'error'));
  </script>
</body>
</html>
