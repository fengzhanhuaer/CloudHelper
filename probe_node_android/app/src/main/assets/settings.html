<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>CloudHelper Probe Node</title>
  <link rel="stylesheet" href="app.css">
</head>
<body data-page="settings">
  <div class="shell">
    <aside>
      <h1 class="brand">CloudHelper<br>Probe Node</h1>
      <nav>
        <a class="nav-button" data-page="status" href="status.html">状态</a>
        <a class="nav-button" data-page="link" href="link.html">链路</a>
        <a class="nav-button" data-page="proxy" href="proxy.html">VNet</a>
        <a class="nav-button" data-page="settings" href="settings.html">设置</a>
      </nav>
    </aside>
    <main>
      <h2 id="pageTitle" class="page-title">设置</h2>
      <p id="pageSubtitle" class="page-subtitle"></p>
      <section class="page">
        <div class="sub-tabs" role="tablist" aria-label="设置分类">
          <button class="sub-tab-button active" type="button" data-settings-tab="controller">主控</button>
          <button class="sub-tab-button" type="button" data-settings-tab="upgrade">升级</button>
        </div>
        <div id="settingsControllerPanel" class="tab-panel" data-settings-panel="controller">
          <div class="field">
            <label for="controllerUrl">Controller URL</label>
            <input id="controllerUrl" autocomplete="off" placeholder="https://controller.example.com">
          </div>
          <div class="field">
            <label for="nodeId">Node ID</label>
            <input id="nodeId" autocomplete="off">
          </div>
          <div class="field">
            <label for="nodeSecret">Node Secret</label>
            <input id="nodeSecret" type="password" autocomplete="off">
          </div>
          <div class="actions">
            <button id="saveButton" class="command" onclick="saveConfig(true)">Save</button>
            <button class="command neutral" onclick="refreshConfig()">刷新配置</button>
          </div>
          <div id="saveFeedback" class="inline-feedback" aria-live="polite"></div>
          <div class="status-box" id="settingsStatus"></div>
        </div>
        <div id="settingsUpgradePanel" class="tab-panel" data-settings-panel="upgrade" hidden>
          <div class="actions">
            <button id="directUpgradeButton" class="command" onclick="checkUpgrade('direct')">Direct Upgrade</button>
            <button id="proxyUpgradeButton" class="command secondary" onclick="checkUpgrade('proxy')">VNet Upgrade</button>
          </div>
          <div class="upgrade-progress" aria-label="升级进度">
            <div id="upgradeProgressFill" class="upgrade-progress-fill"></div>
          </div>
          <div class="upgrade-grid">
            <div>状态<strong id="upgradeState">-</strong></div>
            <div>阶段<strong id="upgradePhase">-</strong></div>
            <div>进度<strong id="upgradePercent">0%</strong></div>
            <div>下载<strong id="upgradeDownload">-</strong></div>
            <div>速度<strong id="upgradeSpeed">-</strong></div>
            <div>版本<strong id="upgradeVersion">-</strong></div>
          </div>
          <div class="status-box" id="upgradeStatus"></div>
        </div>
      </section>
    </main>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
