<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Probe Node 本地控制台</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #0d1117;
      background-image: radial-gradient(circle at 50% 0%, #1f2937 0%, transparent 70%);
      color: #c9d1d9;
      min-height: 100vh;
    }
    .wrap { max-width: 980px; margin: 5vh auto; padding: 20px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 14px; }
    h1 { margin: 0; font-size: 24px; color: #fff; }
    .sub { color: #8b949e; margin: 4px 0 0; font-size: 13px; }
    .btn {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #c9d1d9;
      cursor: pointer;
    }
    .tiles { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .tile {
      border: 1px solid #30363d;
      border-radius: 12px;
      background: rgba(22, 27, 34, 0.82);
      padding: 16px;
      min-height: 126px;
      box-sizing: border-box;
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.28);
    }
    .tile-title { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
    .tile-value { font-size: 24px; font-family: Consolas, monospace; }
    .tile-sub { margin-top: 8px; color: #8b949e; font-size: 12px; line-height: 1.45; }
    .tile-link { display: block; text-decoration: none; color: #c9d1d9; transition: all .15s ease; }
    .tile-link:hover { border-color: #58a6ff; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(31,111,235,.2); }
    .ok { color: #7ee787; }
    .msg { min-height: 20px; color: #8b949e; font-size: 13px; }
    .msg.error { color: #ff938d; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>Probe Node 本地控制台</h1>
        <p class="sub">磁贴入口页，可进入代理状态、DNS 状态、运行日志与系统设置。</p>
      </div>
      <button id="btn-logout" class="btn" type="button">退出登录</button>
    </div>

    <div class="tiles">
      <a href="/local/proxy" class="tile tile-link" id="tile-proxy">
        <div class="tile-title">代理状态</div>
        <div class="tile-value">🧭</div>
        <div class="tile-sub">进入代理接管、代理组选链、链路刷新与运行状态页面</div>
      </a>

      <a href="/local/dns" class="tile tile-link" id="tile-dns">
        <div class="tile-title">DNS 状态</div>
        <div class="tile-value">🌐</div>
        <div class="tile-sub">查看本地 DNS、Fake IP、真实 IP 缓存与映射关系</div>
      </a>

      <a href="/local/logs" class="tile tile-link" id="tile-logs">
        <div class="tile-title">运行日志</div>
        <div class="tile-value">📜</div>
        <div class="tile-sub">按级别、关键词、时间窗口查看本地探针运行日志</div>
      </a>

      <a href="/local/system" class="tile tile-link" id="tile-system">
        <div class="tile-title">系统设置</div>
        <div class="tile-value">⚙</div>
        <div class="tile-sub">进入 TUN 安装/检查、系统升级、服务重启与退出登录页面</div>
      </a>

      <div class="tile">
        <div class="tile-title">运行状态</div>
        <div class="tile-value ok">在线</div>
        <div class="tile-sub" id="local-time">--</div>
      </div>

      <div class="tile">
        <div class="tile-title">当前账号</div>
        <div class="tile-value" id="username">--</div>
        <div class="tile-sub">/local 独立本地会话</div>
      </div>
    </div>

    <p id="message" class="msg"></p>
  </div>

  <script>
    const messageEl = document.getElementById('message');

    function setMessage(text, type) {
      messageEl.textContent = text || '';
      messageEl.className = 'msg' + (type ? ' ' + type : '');
    }

    async function requestJSON(url, options) {
      const res = await fetch(url, {
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        ...options,
      });
      let data = {};
      try {
        data = await res.json();
      } catch (_) {
        data = {};
      }
      if (!res.ok) {
        const msg = data && data.error ? data.error : ('HTTP ' + res.status);
        const err = new Error(msg);
        err.status = res.status;
        throw err;
      }
      return data;
    }

    function updateLocalTime() {
      document.getElementById('local-time').textContent = new Date().toLocaleString();
    }

    async function loadSession() {
      try {
        const data = await requestJSON('/local/api/auth/session', { method: 'GET' });
        if (!data.authenticated) {
          window.location.href = '/local/login';
          return;
        }
        document.getElementById('username').textContent = data.username || '--';
      } catch (err) {
        if (err && err.status === 401) {
          window.location.href = '/local/login';
          return;
        }
        setMessage('读取会话失败：' + err.message, 'error');
      }
    }

    async function logout() {
      try {
        await requestJSON('/local/api/auth/logout', { method: 'POST', body: '{}' });
      } catch (_) {
      }
      window.location.href = '/local/login';
    }

    document.getElementById('btn-logout').addEventListener('click', () => {
      logout().catch(() => { window.location.href = '/local/login'; });
    });

    updateLocalTime();
    setInterval(updateLocalTime, 1000);
    loadSession();
  </script>
</body>
</html>
