<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%2358a6ff'/%3E%3Cstop offset='100%25' stop-color='%232ea043'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='6' y='6' width='52' height='52' rx='12' fill='%230b1628'/%3E%3Cpath d='M22 21L14 32L22 43' stroke='url(%23g)' stroke-width='5' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3Cpath d='M42 21L50 32L42 43' stroke='url(%23g)' stroke-width='5' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3Cpath d='M30 17L34 47' stroke='%239cd0ff' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E">
    <title>CloudHelper Probe Controller</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.6);
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --success: #2ea043;
            --error: #f85149;
        }
        body {
            margin: 0;
            padding: 28px 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #1f2937 0%, transparent 70%);
        }
        .container {
            width: calc(100vw - 32px);
            z-index: 10;
        }
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
        }
        h1 {
            margin-top: 0;
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
            margin-bottom: 24px;
        }
        .brand-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(88, 166, 255, 0.28), rgba(46, 160, 67, 0.28));
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 14px rgba(88, 166, 255, 0.3);
        }
        .brand-icon svg {
            width: 18px;
            height: 18px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .info-card {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .info-label {
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .info-value {
            font-size: 22px;
            font-weight: 500;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
        }
        .info-subvalue {
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            font-family: 'Courier New', Courier, monospace;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tab-button {
            appearance: none;
            border: 1px solid transparent;
            border-bottom: none;
            background: transparent;
            color: var(--text-secondary);
            padding: 10px 14px;
            font-size: 14px;
            cursor: pointer;
        }
        .tab-button.active {
            color: #fff;
            border-color: rgba(88, 166, 255, 0.35);
            background: rgba(88, 166, 255, 0.12);
        }
        .tab-panel {
            display: none;
        }
        .tab-panel.active {
            display: block;
        }
        .probe-panel-title {
            font-size: 14px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .panel-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .scale-controls {
            display: inline-flex;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.18);
        }
        .scale-button {
            appearance: none;
            border: none;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            background: transparent;
            color: var(--text-secondary);
            padding: 7px 12px;
            font-size: 13px;
            cursor: pointer;
        }
        .scale-button:last-child {
            border-right: none;
        }
        .scale-button.active {
            background: rgba(88, 166, 255, 0.16);
            color: #fff;
        }
        .probe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 12px;
        }
        .probe-item {
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 10px 12px;
            min-height: 116px;
        }
        .probe-item-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            gap: 8px;
        }
        .probe-node-name {
            font-size: 14px;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
        }
        .probe-node-no {
            font-size: 12px;
            color: var(--text-secondary);
            font-family: 'Courier New', Courier, monospace;
        }
        .probe-vendor {
            margin-top: 3px;
            font-size: 12px;
            color: var(--text-secondary);
            font-family: 'Courier New', Courier, monospace;
        }
        .probe-vendor a {
            color: var(--accent);
            text-decoration: none;
        }
        .probe-vendor a:hover {
            text-decoration: underline;
        }
        .probe-online {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.16);
        }
        .probe-online.yes {
            color: #7fe0a0;
            border-color: rgba(46, 160, 67, 0.5);
        }
        .probe-online.no {
            color: #ff9b94;
            border-color: rgba(248, 81, 73, 0.5);
        }
        .probe-metrics {
            display: grid;
            grid-template-columns: repeat(2, minmax(150px, 1fr));
            gap: 4px 12px;
            font-size: 12px;
            color: var(--text-primary);
            font-family: 'Courier New', Courier, monospace;
        }
        .metric-wide {
            grid-column: 1 / -1;
        }
        .probe-last-seen {
            margin-top: 6px;
            color: var(--text-secondary);
            font-size: 12px;
            font-family: 'Courier New', Courier, monospace;
        }
        .network-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        .network-card {
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 12px;
        }
        .network-head {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 8px;
            align-items: flex-start;
        }
        .network-title {
            font-size: 14px;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
        }
        .network-meta {
            font-size: 12px;
            color: var(--text-secondary);
            font-family: 'Courier New', Courier, monospace;
            text-align: right;
        }
        .network-summary {
            display: grid;
            gap: 3px;
            min-width: 220px;
            max-width: 50%;
        }
        .network-summary-row {
            display: grid;
            grid-template-columns: minmax(72px, 1fr) auto;
            gap: 8px;
            align-items: center;
            color: var(--text-secondary);
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            line-height: 1.35;
        }
        .network-summary-name {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--task-color, var(--text-secondary));
        }
        .network-summary-value {
            white-space: nowrap;
            text-align: right;
        }
        .chart-wrap {
            height: 260px;
            width: 100%;
        }
        .chart-wrap canvas {
            width: 100%;
            height: 260px;
            display: block;
        }
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            color: var(--text-secondary);
            font-size: 12px;
            margin-top: 8px;
            font-family: 'Courier New', Courier, monospace;
        }
        .legend span::before {
            content: "";
            display: inline-block;
            width: 8px;
            height: 8px;
            margin-right: 6px;
            border-radius: 2px;
        }
        .legend-latency::before {
            background: #58a6ff;
        }
        .legend-loss::before {
            background: #f85149;
        }
        .task-legend::before {
            background: var(--task-color);
        }
        .refresh-button {
            appearance: none;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(0, 0, 0, 0.18);
            color: var(--text-primary);
            padding: 7px 12px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
        }
        .network-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-panel">
            <h1>
                <div class="brand-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 7L4 12L8 17" stroke="#9cd0ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M16 7L20 12L16 17" stroke="#9cd0ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M11 5L13 19" stroke="#4ad08f" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                CloudHelper Probe Controller
            </h1>
            <div class="tabs" role="tablist">
                <button class="tab-button active" type="button" data-tab="probe-status">探针状态</button>
                <button class="tab-button" type="button" data-tab="network-status">网络状态</button>
            </div>
            <div id="probe-status" class="tab-panel active">
                <div class="info-grid">
                    <div class="info-card">
                        <div class="info-label">Controller Uptime</div>
                        <div class="info-value" id="uptime">--:--:--</div>
                        <div class="info-subvalue" id="started-at">Started: -</div>
                    </div>
                </div>
                <div class="probe-panel-title">Probe Runtime Metrics (Public, Desensitized)</div>
                <div id="probe-grid" class="probe-grid">
                    <div class="probe-item">No probe data</div>
                </div>
            </div>
            <div id="network-status" class="tab-panel">
                <div class="panel-toolbar">
                    <div class="probe-panel-title">Network Test Metrics (Public, Desensitized)</div>
                    <div class="network-actions">
                        <div class="scale-controls" aria-label="网络曲线时间刻度">
                            <button class="scale-button active" type="button" data-scale="minute">分钟</button>
                            <button class="scale-button" type="button" data-scale="hour">小时</button>
                            <button class="scale-button" type="button" data-scale="day">天</button>
                        </div>
                        <button id="network-refresh" class="refresh-button" type="button">刷新</button>
                    </div>
                </div>
                <div id="network-grid" class="network-grid">
                    <div class="network-card">No network data</div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const uptimeEl = document.getElementById('uptime');
        const startedAtEl = document.getElementById('started-at');
        const probeGridEl = document.getElementById('probe-grid');
        const networkGridEl = document.getElementById('network-grid');
        const networkRefreshEl = document.getElementById('network-refresh');
        let currentNetworkScale = 'minute';
        let networkLoaded = false;
        let lastNetworkItems = [];
        const taskColors = ['#58a6ff', '#f85149', '#2ea043', '#d29922', '#bc8cff', '#39c5cf', '#ff7b72', '#a5d6ff', '#7ee787', '#ffa657'];

        function formatUptime(seconds) {
            seconds = Number(seconds);
            if (!Number.isFinite(seconds) || seconds < 0) seconds = 0;
            const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return h + ':' + m + ':' + s;
        }

        function formatDateTime(raw) {
            const date = new Date(raw);
            if (!Number.isFinite(date.getTime())) return '-';
            return date.toLocaleString();
        }

        function formatMachineUptime(seconds) {
            seconds = Number(seconds);
            if (!Number.isFinite(seconds) || seconds <= 0) return '-';
            return formatUptime(seconds);
        }

        function formatBytes(bytes) {
            bytes = Number(bytes);
            if (!Number.isFinite(bytes) || bytes <= 0) return '-';
            const units = ['B', 'KiB', 'MiB', 'GiB', 'TiB'];
            let value = bytes;
            let index = 0;
            while (value >= 1024 && index < units.length - 1) {
                value = value / 1024;
                index += 1;
            }
            const digits = value >= 100 ? 0 : (value >= 10 ? 1 : 2);
            return value.toFixed(digits) + ' ' + units[index];
        }

        function metricWithAbsolute(percent, used, total) {
            return pct(percent) + ' / ' + formatBytes(used) + ' / ' + formatBytes(total);
        }

        function escapeHTML(value) {
            return String(value == null ? '' : value).replace(/[&<>"']/g, (ch) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            })[ch]);
        }

        function normalizeExternalURL(raw) {
            const text = String(raw || '').trim();
            if (!text) return '';
            try {
                const parsed = new URL(text);
                const protocol = String(parsed.protocol || '').toLowerCase();
                if (protocol !== 'http:' && protocol !== 'https:') return '';
                return parsed.href;
            } catch (_) {
                return '';
            }
        }

        function formatVendorLink(name, rawURL) {
            const cleanName = String(name || '').trim();
            if (!cleanName) return '';
            const safeName = escapeHTML(cleanName);
            const url = normalizeExternalURL(rawURL);
            if (!url) return safeName;
            return '<a href="' + escapeHTML(url) + '" target="_blank" rel="noopener noreferrer" title="' + escapeHTML(url) + '">' + safeName + '</a>';
        }

        async function checkStatus() {
            try {
                const res = await fetch('/dashboard/status');
                if (!res.ok) throw new Error('Not OK');
                const data = await res.json();
                uptimeEl.innerText = formatUptime(data.uptime);
                startedAtEl.innerText = 'Started: ' + formatDateTime(data.started_at);
            } catch (_) {
                // keep last known uptime
            }
        }

        function pct(v) {
            if (typeof v !== 'number' || Number.isNaN(v)) return '--';
            return v.toFixed(1) + '%';
        }

        function nodeNoOf(item) {
            const n = Number(item && item.node_no);
            if (!Number.isFinite(n) || n <= 0) return 0;
            return Math.floor(n);
        }

        function sortedByNodeNo(items) {
            const list = Array.isArray(items) ? items.slice() : [];
            list.sort((a, b) => {
                const an = nodeNoOf(a);
                const bn = nodeNoOf(b);
                if (an > 0 && bn > 0 && an !== bn) return an - bn;
                if (an > 0 && bn <= 0) return -1;
                if (an <= 0 && bn > 0) return 1;
                const aname = String((a && a.node_name) || '');
                const bname = String((b && b.node_name) || '');
                if (aname !== bname) return aname.localeCompare(bname, 'zh-Hans-CN');
                return 0;
            });
            return list;
        }

        function renderProbes(items) {
            const sorted = sortedByNodeNo(items);
            if (sorted.length === 0) {
                probeGridEl.innerHTML = '<div class="probe-item">No probe data</div>';
                return;
            }
            probeGridEl.innerHTML = sorted.map((item, index) => {
                const sys = item.system || {};
                const onlineClass = item.online ? 'yes' : 'no';
                const onlineText = item.online ? 'online' : 'offline';
                const nodeNo = nodeNoOf(item);
                const name = (item.node_name && String(item.node_name).trim())
                    ? String(item.node_name).trim()
                    : ('probe #' + String(nodeNo > 0 ? nodeNo : index + 1));
                const lastSeen = item.last_seen ? String(item.last_seen) : '-';
                const machineUptime = formatMachineUptime(item.machine_uptime_seconds);
                const bootTime = formatDateTime(item.machine_boot_time);
                const vendor = formatVendorLink(item.vendor_name, item.vendor_url);
                const vendorLine = vendor ? '<div class="probe-vendor">厂家: ' + vendor + '</div>' : '';
                return '<div class="probe-item">'
                    + '<div class="probe-item-head">'
                    + '<div>'
                    + '<div class="probe-node-name">' + escapeHTML(name) + '</div>'
                    + '<div class="probe-node-no">序号: ' + (nodeNo > 0 ? nodeNo : '-') + '</div>'
                    + vendorLine
                    + '</div>'
                    + '<div class="probe-online ' + onlineClass + '">' + onlineText + '</div>'
                    + '</div>'
                    + '<div class="probe-metrics">'
                    + '<div>CPU: ' + pct(sys.cpu_percent) + '</div>'
                    + '<div class="metric-wide">RAM: ' + metricWithAbsolute(sys.memory_used_percent, sys.memory_used_bytes, sys.memory_total_bytes) + '</div>'
                    + '<div class="metric-wide">SWAP: ' + metricWithAbsolute(sys.swap_used_percent, sys.swap_used_bytes, sys.swap_total_bytes) + '</div>'
                    + '<div class="metric-wide">DISK: ' + metricWithAbsolute(sys.disk_used_percent, sys.disk_used_bytes, sys.disk_total_bytes) + '</div>'
                    + '<div class="metric-wide">机器运行: ' + machineUptime + ' / 开机: ' + bootTime + '</div>'
                    + '</div>'
                    + '<div class="probe-last-seen">Last Seen: ' + escapeHTML(lastSeen) + '</div>'
                    + '</div>';
            }).join('');
        }

        async function checkProbes() {
            try {
                const res = await fetch('/dashboard/probes');
                if (!res.ok) throw new Error('Not OK');
                const data = await res.json();
                renderProbes(data.items || []);
            } catch (_) {
                // keep old view
            }
        }

        function renderNetwork(items) {
            const sorted = sortedByNodeNo(items);
            lastNetworkItems = sorted;
            if (sorted.length === 0) {
                networkGridEl.innerHTML = '<div class="network-card">No network data</div>';
                return;
            }
            networkGridEl.innerHTML = sorted.map((item, index) => {
                const nodeNo = nodeNoOf(item);
                const name = (item.node_name && String(item.node_name).trim())
                    ? String(item.node_name).trim()
                    : ('probe #' + String(nodeNo > 0 ? nodeNo : index + 1));
                const series = normalizeNetworkSeries(item.series);
                const canvasID = 'network-chart-' + index;
                const summary = networkSeriesSummaries(series);
                const latestHTML = summary.length
                    ? summary.map((entry) => {
                        return '<div class="network-summary-row" style="--task-color:' + entry.color + '">'
                            + '<span class="network-summary-name" title="' + escapeHTML(entry.name) + '">' + escapeHTML(entry.name) + '</span>'
                            + '<span class="network-summary-value">' + entry.latency + 'ms / ' + entry.loss + '%</span>'
                            + '</div>';
                    }).join('')
                    : '<div class="network-meta">No points</div>';
                const legend = series.map((entry, seriesIndex) => {
                    const color = taskColors[seriesIndex % taskColors.length];
                    return '<span class="task-legend" style="--task-color:' + color + '">' + escapeHTML(entry.task_name || entry.task_id || '未命名任务') + '</span>';
                }).join('');
                return '<div class="network-card">'
                    + '<div class="network-head">'
                    + '<div>'
                    + '<div class="network-title">' + escapeHTML(name) + '</div>'
                    + '<div class="network-meta">序号: ' + (nodeNo > 0 ? nodeNo : '-') + '</div>'
                    + '</div>'
                    + '<div class="network-summary">' + latestHTML + '</div>'
                    + '</div>'
                    + '<div class="chart-wrap"><canvas id="' + canvasID + '" width="640" height="260"></canvas></div>'
                    + '<div class="legend">' + legend + '</div>'
                    + '</div>';
            }).join('');
            sorted.forEach((item, index) => {
                const canvas = document.getElementById('network-chart-' + index);
                drawNetworkChart(canvas, normalizeNetworkSeries(item.series));
            });
        }

        function normalizeNetworkSeries(series) {
            if (!Array.isArray(series)) return [];
            return series.map((entry) => ({
                task_id: String((entry && entry.task_id) || ''),
                task_name: String((entry && entry.task_name) || (entry && entry.task_id) || '未命名任务'),
                points: Array.isArray(entry && entry.points) ? entry.points : []
            })).filter((entry) => entry.points.length > 0);
        }

        function networkSeriesSummaries(series) {
            return series.map((entry, index) => {
                let latest = null;
                entry.points.forEach((point) => {
                    const ts = Date.parse(point.timestamp);
                    if (!Number.isFinite(ts)) return;
                    if (!latest || ts > latest.ts) latest = { ts, point };
                });
                if (!latest || !latest.point) return null;
                return {
                    name: entry.task_name || entry.task_id || '未命名任务',
                    color: taskColors[index % taskColors.length],
                    latency: Number(latest.point.latency_avg_ms || 0).toFixed(1),
                    loss: Number(latest.point.loss_percent || 0).toFixed(1)
                };
            }).filter(Boolean);
        }

        function drawNetworkChart(canvas, series) {
            if (!canvas) return;
            const rect = canvas.getBoundingClientRect();
            const ratio = window.devicePixelRatio || 1;
            const width = Math.max(320, Math.floor(rect.width * ratio));
            const height = Math.max(260, Math.floor(rect.height * ratio));
            if (canvas.width !== width || canvas.height !== height) {
                canvas.width = width;
                canvas.height = height;
            }
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, width, height);
            const padL = 54 * ratio;
            const padR = 48 * ratio;
            const padT = 18 * ratio;
            const padB = 34 * ratio;
            const plotW = Math.max(1, width - padL - padR);
            const plotH = Math.max(1, height - padT - padB);

            ctx.fillStyle = 'rgba(201,209,217,0.78)';
            ctx.font = (11 * ratio) + 'px Courier New';
            if (!series.length) {
                ctx.fillText('No network data', padL, padT + 24 * ratio);
                return;
            }

            const allPoints = series.flatMap((entry) => entry.points);
            const minTime = Math.min(...allPoints.map((p) => Date.parse(p.timestamp)).filter(Number.isFinite));
            const maxTime = Math.max(...allPoints.map((p) => Date.parse(p.timestamp)).filter(Number.isFinite));
            const latencyMax = Math.max(10, ...allPoints.map((p) => Number(p.latency_avg_ms) || 0));
            const lossMax = Math.max(10, ...allPoints.map((p) => Number(p.loss_percent) || 0));
            drawChartAxes(ctx, ratio, width, height, padL, padR, padT, padB, plotW, plotH, latencyMax, lossMax, minTime, maxTime);
            const xOfTime = (raw) => {
                const ts = Date.parse(raw);
                if (!Number.isFinite(ts) || !Number.isFinite(minTime) || !Number.isFinite(maxTime) || minTime === maxTime) return padL + plotW;
                return padL + ((ts - minTime) / (maxTime - minTime)) * plotW;
            };
            const latencyY = (v) => padT + plotH - (Math.max(0, Number(v) || 0) / latencyMax) * plotH;
            const lossY = (v) => padT + plotH - (Math.max(0, Number(v) || 0) / lossMax) * plotH;

            series.forEach((entry, index) => {
                const color = taskColors[index % taskColors.length];
                drawLine(ctx, entry.points, xOfTime, latencyY, 'latency_avg_ms', color, ratio, false);
                drawLine(ctx, entry.points, xOfTime, lossY, 'loss_percent', color, ratio, true);
            });

        }

        function drawChartAxes(ctx, ratio, width, height, padL, padR, padT, padB, plotW, plotH, latencyMax, lossMax, minTime, maxTime) {
            ctx.save();
            ctx.lineWidth = 0.6 * ratio;
            ctx.strokeStyle = 'rgba(255,255,255,0.08)';
            ctx.fillStyle = 'rgba(201,209,217,0.58)';
            ctx.font = (10 * ratio) + 'px Courier New';
            ctx.textBaseline = 'middle';

            for (let i = 0; i <= 4; i += 1) {
                const y = padT + (plotH * i / 4);
                const valueRatio = 1 - i / 4;
                ctx.beginPath();
                ctx.moveTo(padL, y);
                ctx.lineTo(width - padR, y);
                ctx.stroke();
                ctx.textAlign = 'right';
                ctx.fillStyle = 'rgba(88,166,255,0.72)';
                ctx.fillText(Math.round(latencyMax * valueRatio) + 'ms', padL - 8 * ratio, y);
                ctx.textAlign = 'left';
                ctx.fillStyle = 'rgba(248,81,73,0.72)';
                ctx.fillText(Math.round(lossMax * valueRatio) + '%', width - padR + 8 * ratio, y);
            }

            ctx.strokeStyle = 'rgba(255,255,255,0.12)';
            ctx.beginPath();
            ctx.moveTo(padL, padT);
            ctx.lineTo(padL, height - padB);
            ctx.lineTo(width - padR, height - padB);
            ctx.lineTo(width - padR, padT);
            ctx.stroke();

            ctx.textBaseline = 'top';
            ctx.fillStyle = 'rgba(201,209,217,0.62)';
            const tickCount = (Number.isFinite(minTime) && Number.isFinite(maxTime) && maxTime > minTime)
                ? Math.min(9, Math.max(4, Math.floor((plotW / ratio) / 110) + 1))
                : 1;
            for (let index = 0; index < tickCount; index += 1) {
                const position = tickCount === 1 ? 1 : index / (tickCount - 1);
                const ts = minTime + (maxTime - minTime) * position;
                if (!Number.isFinite(ts)) continue;
                const x = padL + plotW * position;
                ctx.strokeStyle = 'rgba(255,255,255,0.04)';
                ctx.beginPath();
                ctx.moveTo(x, padT);
                ctx.lineTo(x, height - padB);
                ctx.stroke();
                ctx.textAlign = index === 0 ? 'left' : index === tickCount - 1 ? 'right' : 'center';
                ctx.fillText(formatTimeLabel(new Date(ts).toISOString(), currentNetworkScale), x, height - padB + 8 * ratio);
            }
            ctx.restore();
        }

        function drawLine(ctx, points, xOf, yOf, field, color, ratio, dashed) {
            ctx.strokeStyle = color;
            ctx.lineWidth = dashed ? 1.2 * ratio : 1.8 * ratio;
            ctx.setLineDash(dashed ? [4 * ratio, 4 * ratio] : []);
            ctx.beginPath();
            let started = false;
            points.forEach((point, index) => {
                const x = xOf(point.timestamp);
                const y = yOf(point[field]);
                if (!started) {
                    ctx.moveTo(x, y);
                    started = true;
                }
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function formatTimeLabel(raw, scale) {
            const date = new Date(raw);
            if (!Number.isFinite(date.getTime())) return '-';
            if (scale === 'day') {
                return date.toLocaleDateString([], { month: '2-digit', day: '2-digit' });
            }
            if (scale === 'hour') {
                return date.toLocaleString([], { month: '2-digit', day: '2-digit', hour: '2-digit' });
            }
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        async function checkNetwork() {
            try {
                const res = await fetch('/dashboard/network?scale=' + encodeURIComponent(currentNetworkScale));
                if (!res.ok) throw new Error('Not OK');
                const data = await res.json();
                networkLoaded = true;
                renderNetwork(data.items || []);
            } catch (_) {
                // keep old view
            }
        }

        document.querySelectorAll('.tab-button').forEach((button) => {
            button.addEventListener('click', () => {
                const tab = button.getAttribute('data-tab');
                document.querySelectorAll('.tab-button').forEach((item) => item.classList.toggle('active', item === button));
                document.querySelectorAll('.tab-panel').forEach((panel) => panel.classList.toggle('active', panel.id === tab));
                if (tab === 'network-status' && !networkLoaded) checkNetwork();
            });
        });

        document.querySelectorAll('.scale-button').forEach((button) => {
            button.addEventListener('click', () => {
                currentNetworkScale = button.getAttribute('data-scale') || 'minute';
                document.querySelectorAll('.scale-button').forEach((item) => item.classList.toggle('active', item === button));
                checkNetwork();
            });
        });

        if (networkRefreshEl) {
            networkRefreshEl.addEventListener('click', () => checkNetwork());
        }

        checkStatus();
        checkProbes();
        setInterval(checkStatus, 2000);
        setInterval(checkProbes, 5000);
        window.addEventListener('resize', () => renderNetwork(lastNetworkItems));
    </script>
</body>
</html>
