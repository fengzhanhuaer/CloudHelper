name: Build and Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'version'

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump_version.outputs.new_version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump Version and Tag
        id: bump_version
        shell: bash
        run: |
          if [ ! -f "version" ]; then
            echo "0.0.0" > version
          fi

          VERSION=$(cat version | tr -d '\r')
          IFS='.' read -r -a parts <<< "$VERSION"
          patch=$((parts[2] + 1))
          NEW_VERSION="${parts[0]}.${parts[1]}.$patch"
          echo "$NEW_VERSION" > version
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push

          git tag "v$NEW_VERSION"
          git push origin "v$NEW_VERSION"

  build-probe-controller:
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Tagged Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: v${{ needs.prepare-release.outputs.new_version }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Build Probe Controller (Linux amd64)
        working-directory: probe_controller
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
          NEW_VERSION: ${{ needs.prepare-release.outputs.new_version }}
        shell: bash
        run: go build -ldflags "-X github.com/cloudhelper/probe_controller/internal/core.BuildVersion=v${NEW_VERSION}" -o cloudhelper-probe-controller-linux-amd64 .

      - name: Upload Probe Controller Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudhelper-probe-controller-linux-amd64
          path: probe_controller/cloudhelper-probe-controller-linux-amd64

  build-probe-node:
    needs: prepare-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: cloudhelper-probe-node-linux-amd64
            artifact_name: cloudhelper-probe-node-linux-amd64
          - goos: linux
            goarch: arm64
            output: cloudhelper-probe-node-linux-arm64
            artifact_name: cloudhelper-probe-node-linux-arm64
          - goos: windows
            goarch: amd64
            output: cloudhelper-probe-node-windows-amd64.exe
            artifact_name: cloudhelper-probe-node-windows-amd64.exe
    steps:
      - name: Checkout Tagged Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: v${{ needs.prepare-release.outputs.new_version }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Build Probe Node (${{ matrix.goos }} ${{ matrix.goarch }})
        working-directory: probe_node
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          NEW_VERSION: ${{ needs.prepare-release.outputs.new_version }}
        shell: bash
        run: go build -ldflags "-X main.BuildVersion=v${NEW_VERSION}" -o ${{ matrix.output }} .

      - name: Upload Probe Node Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: probe_node/${{ matrix.output }}

  build-probe-node-android-unsigned:
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Tagged Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: v${{ needs.prepare-release.outputs.new_version }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build Probe Node Android unsigned release (arm64)
        working-directory: probe_node_android
        env:
          CLOUDHELPER_VERSION: v${{ needs.prepare-release.outputs.new_version }}
        shell: bash
        run: gradle :app:assembleRelease -PcloudhelperAndroidUnsignedRelease=true

      - name: Stage Probe Node Android unsigned APK
        shell: bash
        run: cp probe_node_android/app/build/outputs/apk/release/app-release-unsigned.apk probe_node_android/cloudhelper-probe-node-android-arm64-unsigned.apk

      - name: Upload Probe Node Android unsigned artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudhelper-probe-node-android-arm64-unsigned.apk
          path: probe_node_android/cloudhelper-probe-node-android-arm64-unsigned.apk

  sign-probe-node-android:
    needs:
      - prepare-release
      - build-probe-node-android-unsigned
    runs-on: ubuntu-latest
    environment: android-release-signing
    steps:
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Probe Node Android unsigned artifact
        uses: actions/download-artifact@v4
        with:
          name: cloudhelper-probe-node-android-arm64-unsigned.apk
          path: android-signing

      - name: Restore Android signing key
        env:
          CLOUDHELPER_ANDROID_KEYSTORE_BASE64: ${{ secrets.CLOUDHELPER_ANDROID_KEYSTORE_BASE64 }}
          CLOUDHELPER_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.CLOUDHELPER_ANDROID_KEYSTORE_PASSWORD }}
        shell: bash
        run: |
          if [ -z "$CLOUDHELPER_ANDROID_KEYSTORE_BASE64" ] || [ -z "$CLOUDHELPER_ANDROID_KEYSTORE_PASSWORD" ]; then
            echo "Android signing secrets are incomplete. Configure CLOUDHELPER_ANDROID_KEYSTORE_BASE64 and CLOUDHELPER_ANDROID_KEYSTORE_PASSWORD in the android-release-signing environment." >&2
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/cloudhelper-android-signing"
          printf '%s' "$CLOUDHELPER_ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/cloudhelper-android-signing/release.p12"

      - name: Sign Probe Node Android APK
        env:
          CLOUDHELPER_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.CLOUDHELPER_ANDROID_KEYSTORE_PASSWORD }}
        shell: bash
        run: |
          ZIPALIGN="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)/zipalign"
          APKSIGNER="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)/apksigner"
          "$ZIPALIGN" -p -f 4 android-signing/cloudhelper-probe-node-android-arm64-unsigned.apk android-signing/cloudhelper-probe-node-android-arm64-aligned.apk
          "$APKSIGNER" sign \
            --ks "$RUNNER_TEMP/cloudhelper-android-signing/release.p12" \
            --ks-type PKCS12 \
            --ks-pass "pass:$CLOUDHELPER_ANDROID_KEYSTORE_PASSWORD" \
            --out android-signing/cloudhelper-probe-node-android-arm64.apk \
            android-signing/cloudhelper-probe-node-android-arm64-aligned.apk
          "$APKSIGNER" verify --verbose android-signing/cloudhelper-probe-node-android-arm64.apk

      - name: Upload Probe Node Android signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudhelper-probe-node-android-arm64.apk
          path: android-signing/cloudhelper-probe-node-android-arm64.apk

  create-release:
    needs:
      - prepare-release
      - build-probe-controller
      - build-probe-node
      - sign-probe-node-android
    runs-on: ubuntu-latest
    steps:
      - name: Download Probe Controller Artifact
        uses: actions/download-artifact@v4
        with:
          name: cloudhelper-probe-controller-linux-amd64
          path: release-assets

      - name: Download Probe Node Artifact
        uses: actions/download-artifact@v4
        with:
          name: cloudhelper-probe-node-linux-amd64
          path: release-assets

      - name: Download Probe Node Artifact (arm64)
        uses: actions/download-artifact@v4
        with:
          name: cloudhelper-probe-node-linux-arm64
          path: release-assets

      - name: Download Probe Node Artifact (windows amd64)
        uses: actions/download-artifact@v4
        with:
          name: cloudhelper-probe-node-windows-amd64.exe
          path: release-assets

      - name: Download Probe Node Android Artifact (arm64)
        uses: actions/download-artifact@v4
        with:
          name: cloudhelper-probe-node-android-arm64.apk
          path: release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare-release.outputs.new_version }}
          name: Release v${{ needs.prepare-release.outputs.new_version }}
          files: |
            release-assets/cloudhelper-probe-controller-linux-amd64
            release-assets/cloudhelper-probe-node-linux-amd64
            release-assets/cloudhelper-probe-node-linux-arm64
            release-assets/cloudhelper-probe-node-windows-amd64.exe
            release-assets/cloudhelper-probe-node-android-arm64.apk
