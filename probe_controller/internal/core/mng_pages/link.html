<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CloudHelper 链路管理</title>
  <style>
    :root { color-scheme: dark; }
    body { margin:0; font-family:Segoe UI,Roboto,Arial,sans-serif; background:#0d1117; color:#c9d1d9; }
    .wrap { max-width:1280px; margin:4vh auto; padding:20px; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:14px; }
    h1 { margin:0; font-size:24px; }
    .sub { color:#8b949e; margin:6px 0 0; font-size:13px; }
    .btn { padding:8px 12px; border-radius:8px; border:1px solid #30363d; background:#21262d; color:#c9d1d9; cursor:pointer; }
    .btn.primary { background:#1f6feb; border-color:#2f81f7; color:#fff; }
    .btn.warn { background:#9e6a03; border-color:#bb8009; color:#fff; }
    .btn:disabled { opacity:.6; cursor:not-allowed; }
    .status { margin:8px 0 12px; border-radius:8px; border:1px solid #30363d; background:#161b22; padding:10px; font-size:13px; white-space:pre-wrap; }
    .status.ok { color:#7ee787; }
    .status.warn { color:#f2cc60; }
    .status.err { color:#ff7b72; }
    .tabs { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
    .tab { padding:8px 12px; border-radius:999px; border:1px solid #30363d; background:#161b22; color:#c9d1d9; cursor:pointer; }
    .tab.active { border-color:#58a6ff; color:#58a6ff; }
    .panel { border:1px solid #30363d; border-radius:12px; background:#161b22; padding:14px; }
    .section { display:none; }
    .section.active { display:block; }
    .row { display:flex; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
    .row label { min-width:120px; color:#8b949e; font-size:13px; }
    input, select, textarea {
      background:#0d1117;
      color:#c9d1d9;
      border:1px solid #30363d;
      border-radius:8px;
      padding:7px 8px;
    }
    input, select { min-width:180px; }
    input.small, select.small { min-width:120px; }
    input.wide, select.wide { min-width:260px; }
    table { width:100%; border-collapse:collapse; margin-top:8px; }
    th, td { border-bottom:1px solid #30363d; padding:8px 6px; text-align:left; vertical-align:top; font-size:13px; }
    th { color:#8b949e; font-weight:600; }
    .mono { font-family:Consolas,monospace; }
    .muted { color:#8b949e; }
    .stack { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media (max-width: 1080px) { .stack { grid-template-columns:1fr; } }
    .box { border:1px solid #30363d; border-radius:10px; padding:10px; }
    .small { font-size:12px; }
    .inline-tag {
      display:inline-block;
      border:1px solid #30363d;
      border-radius:999px;
      padding:2px 8px;
      font-size:12px;
      color:#8b949e;
      margin-right:6px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>/mng/link</h1>
        <p class="sub">链路管理：极简添加、链路编辑、端口转发（默认值对齐 manager）。</p>
      </div>
      <div>
        <button id="btn-back" class="btn" type="button">返回磁贴面板</button>
        <button id="btn-logout" class="btn" type="button">退出登录</button>
      </div>
    </div>

    <div id="status-box" class="status">初始化中...</div>

    <div class="tabs">
      <button class="tab active" data-tab="add" type="button">链路添加</button>
      <button class="tab" data-tab="edit" type="button">链路查看（编辑）</button>
      <button class="tab" data-tab="pf" type="button">端口转发</button>
    </div>

    <div class="panel">
      <section id="section-add" class="section active">
        <div class="stack">
          <div class="box">
            <div class="row">
              <label for="add-chain-name">链路名称</label>
              <input id="add-chain-name" class="wide" placeholder="例如：CN-Relay-01" />
            </div>
            <div class="row">
              <label for="add-chain-type">链路类型</label>
              <select id="add-chain-type" class="wide">
                <option value="port_forward">端口转发</option>
                <option value="proxy_chain">代理链路</option>
              </select>
            </div>
            <div class="row">
              <label for="add-node-id">节点</label>
              <select id="add-node-id" class="wide"></select>
            </div>
            <div class="row">
              <label>默认用户</label>
              <div id="add-default-user" class="mono muted">-</div>
            </div>
            <div class="row">
              <button id="btn-create-minimal-chain" class="btn primary" type="button">创建链路</button>
              <button id="btn-add-reset" class="btn" type="button">清空</button>
            </div>
            <div class="small muted">
              默认值：listen_host=0.0.0.0，listen_port=16030，link_layer=http，dial_mode=forward，egress=127.0.0.1:1080。
            </div>
          </div>

          <div class="box">
            <div class="muted">提交预览</div>
            <pre id="add-preview" class="mono">{}</pre>
          </div>
        </div>
      </section>

      <section id="section-edit" class="section">
        <div class="row">
          <button id="btn-refresh-chains" class="btn" type="button">刷新链路列表</button>
          <button id="btn-delete-selected" class="btn warn" type="button">删除当前链路</button>
        </div>
        <div class="row">
          <label for="edit-chain-select">选择链路</label>
          <select id="edit-chain-select" class="wide"></select>
        </div>

        <div class="box" style="margin-bottom:12px;">
          <div class="row">
            <label for="edit-chain-name">链路名称</label>
            <input id="edit-chain-name" class="wide" />
          </div>
          <div class="row">
            <label for="edit-chain-type">链路类型</label>
            <select id="edit-chain-type" class="wide">
              <option value="port_forward">端口转发</option>
              <option value="proxy_chain">代理链路</option>
            </select>
          </div>
          <div class="row">
            <label for="edit-chain-user">用户</label>
            <select id="edit-chain-user" class="wide"></select>
            <span id="edit-user-key-hint" class="small muted"></span>
          </div>
          <div class="row">
            <button id="btn-save-chain" class="btn primary" type="button">保存链路</button>
            <button id="btn-add-hop" class="btn" type="button">添加节点</button>
          </div>
        </div>

        <table>
          <thead>
            <tr>
              <th>顺序</th>
              <th>节点</th>
              <th>监听地址</th>
              <th>监听端口</th>
              <th>外部端口</th>
              <th>链路协议</th>
              <th>建立方向</th>
              <th>relay_host</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="edit-hop-body"></tbody>
        </table>
      </section>

      <section id="section-pf" class="section">
        <div class="row">
          <label for="pf-chain-select">端口转发链路</label>
          <select id="pf-chain-select" class="wide"></select>
          <button id="btn-pf-add" class="btn" type="button">添加规则</button>
          <button id="btn-pf-save" class="btn primary" type="button">保存规则</button>
        </div>

        <div class="row">
          <span class="inline-tag">仅显示 chain_type=port_forward 链路</span>
          <span id="pf-summary" class="small muted">暂无规则</span>
        </div>

        <table>
          <thead>
            <tr>
              <th>规则</th>
              <th>入口侧</th>
              <th>本地监听</th>
              <th>远端目标</th>
              <th>协议</th>
              <th>启用</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="pf-body"></tbody>
        </table>
      </section>
    </div>
  </div>

  <script>
    const DEFAULTS = {
      listenHost: '0.0.0.0',
      listenPort: 16030,
      linkLayer: 'http',
      dialMode: 'forward',
      egressHost: '127.0.0.1',
      egressPort: 1080,
      portForwardListenHost: '0.0.0.0',
    };

    const state = {
      activeTab: 'add',
      users: [],
      selectedUser: '',
      selectedPublicKey: '',
      nodes: [],
      chains: [],
      selectedChainID: '',
      nodeDomainsByID: {},
      nodeDomainsLoading: {},
      editForm: {
        chainID: '',
        name: '',
        chainType: 'port_forward',
        userID: '',
        userPublicKey: '',
        secret: '',
        hops: [],
        portForwards: [],
      },
    };

    function setStatus(message, level) {
      const box = document.getElementById('status-box');
      box.textContent = String(message || '');
      box.className = 'status';
      if (level) box.classList.add(level);
    }

    async function requestJSON(url, options = {}) {
      const response = await fetch(url, { credentials: 'same-origin', ...options });
      let payload = {};
      try { payload = await response.json(); } catch (_) {}
      if (!response.ok) {
        const msg = payload && payload.error ? payload.error : `HTTP ${response.status}`;
        throw new Error(msg);
      }
      return payload;
    }

    async function ensureSession() {
      const payload = await requestJSON('/mng/api/session');
      if (!payload.authenticated) {
        location.href = '/mng';
        return false;
      }
      return true;
    }

    function normalizeNodeID(raw) {
      const value = String(raw || '').trim();
      if (!value) return '';
      const n = Number.parseInt(value, 10);
      if (!Number.isFinite(n) || n <= 0) return '';
      return String(n);
    }

    function normalizeChainType(raw) {
      const value = String(raw || '').trim().toLowerCase();
      return value === 'proxy_chain' ? 'proxy_chain' : 'port_forward';
    }

    function normalizeLayer(raw) {
      const value = String(raw || '').trim().toLowerCase();
      if (value === 'http2' || value === 'h2') return 'http2';
      if (value === 'http3' || value === 'h3') return 'http3';
      return 'http';
    }

    function normalizeDialMode(raw) {
      return String(raw || '').trim().toLowerCase() === 'reverse' ? 'reverse' : 'forward';
    }

    function normalizePort(raw, fallback = 0) {
      const n = Number.parseInt(String(raw || ''), 10);
      if (!Number.isFinite(n) || n <= 0 || n > 65535) return fallback;
      return n;
    }

    function parseRouteNodeIDs(chain) {
      const out = [];
      const add = (v) => {
        const id = normalizeNodeID(v);
        if (!id) return;
        if (out.includes(id)) return;
        out.push(id);
      };
      add(chain.entry_node_id);
      const cascades = Array.isArray(chain.cascade_node_ids) ? chain.cascade_node_ids : [];
      cascades.forEach(add);
      add(chain.exit_node_id);
      return out;
    }

    function selectedChain() {
      return state.chains.find((c) => String(c.chain_id || '') === String(state.selectedChainID || '')) || null;
    }

    function generateRuleID() {
      return `pf-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`;
    }

    async function ensureNodeDomains(nodeID) {
      const normalized = normalizeNodeID(nodeID);
      if (!normalized) return [];
      if (Array.isArray(state.nodeDomainsByID[normalized])) {
        return state.nodeDomainsByID[normalized].slice();
      }
      if (state.nodeDomainsLoading[normalized]) {
        return state.nodeDomainsLoading[normalized];
      }
      const pending = requestJSON('/mng/api/link/node/domains?node_id=' + encodeURIComponent(normalized))
        .then((payload) => {
          const domains = Array.isArray(payload.domains)
            ? payload.domains.map((item) => String(item || '').trim()).filter(Boolean)
            : [];
          state.nodeDomainsByID[normalized] = domains;
          return domains.slice();
        })
        .catch(() => {
          state.nodeDomainsByID[normalized] = [];
          return [];
        })
        .finally(() => {
          delete state.nodeDomainsLoading[normalized];
          renderEditHops();
        });
      state.nodeDomainsLoading[normalized] = pending;
      return pending;
    }

    async function refreshSelectedPublicKey() {
      const userID = String(state.selectedUser || '').trim();
      if (!userID) {
        state.selectedPublicKey = '';
        renderAddPreview();
        return;
      }
      const payload = await requestJSON('/mng/api/link/user/public_key?username=' + encodeURIComponent(userID));
      state.selectedPublicKey = String(payload.public_key || '').trim();
      renderAddPreview();
    }

    async function refreshEditUserPublicKey() {
      const userID = String(state.editForm.userID || '').trim();
      if (!userID) {
        state.editForm.userPublicKey = '';
        renderEditUserHint();
        return;
      }
      const payload = await requestJSON('/mng/api/link/user/public_key?username=' + encodeURIComponent(userID));
      state.editForm.userPublicKey = String(payload.public_key || '').trim();
      renderEditUserHint();
    }

    function renderEditUserHint() {
      const hint = document.getElementById('edit-user-key-hint');
      hint.textContent = state.editForm.userPublicKey ? '公钥已就绪' : '公钥为空';
    }

    async function loadUsers() {
      const payload = await requestJSON('/mng/api/link/users');
      state.users = Array.isArray(payload.users) ? payload.users : [];
      if (!state.selectedUser && state.users.length > 0) {
        state.selectedUser = String(state.users[0].username || '').trim();
      }
      renderAddDefaultUser();
      renderEditUserSelect();
      await refreshSelectedPublicKey();
    }

    async function loadNodes() {
      const payload = await requestJSON('/mng/api/probe/nodes');
      state.nodes = Array.isArray(payload.nodes)
        ? payload.nodes
          .map((item) => ({
            node_no: Number.parseInt(String(item.node_no || '0'), 10),
            node_name: String(item.node_name || '').trim(),
          }))
          .filter((item) => Number.isFinite(item.node_no) && item.node_no > 0)
          .sort((a, b) => a.node_no - b.node_no)
        : [];
      renderAddNodeOptions();
      renderEditHops();
    }

    async function loadChains(silent) {
      const payload = await requestJSON('/mng/api/link/chains');
      state.chains = Array.isArray(payload.items) ? payload.items : [];
      if (!state.selectedChainID && state.chains.length > 0) {
        state.selectedChainID = String(state.chains[0].chain_id || '');
      }
      renderChainSelects();
      if (!silent) setStatus(`链路列表已刷新：${state.chains.length} 条`, 'ok');
    }

    function bindTabs() {
      const tabs = Array.from(document.querySelectorAll('.tab'));
      tabs.forEach((button) => {
        button.addEventListener('click', () => {
          state.activeTab = String(button.dataset.tab || 'add');
          tabs.forEach((btn) => btn.classList.toggle('active', btn === button));
          document.querySelectorAll('.section').forEach((section) => {
            section.classList.toggle('active', section.id === `section-${state.activeTab}`);
          });
          if (state.activeTab === 'pf') {
            renderPFSection();
          }
        });
      });
    }

    function renderAddDefaultUser() {
      const el = document.getElementById('add-default-user');
      el.textContent = state.selectedUser || (state.users.length ? String(state.users[0].username || '').trim() : '-');
    }

    function renderAddNodeOptions() {
      const select = document.getElementById('add-node-id');
      if (!state.nodes.length) {
        select.innerHTML = '<option value="">暂无节点</option>';
        renderAddPreview();
        return;
      }
      select.innerHTML = state.nodes
        .map((item) => `<option value="${item.node_no}">#${item.node_no} ${item.node_name || ''}</option>`)
        .join('');
      renderAddPreview();
    }

    function renderEditUserSelect() {
      const select = document.getElementById('edit-chain-user');
      const current = String(state.editForm.userID || '').trim();
      const seen = new Set();
      const options = [];
      if (current) {
        seen.add(current);
        options.push(`<option value="${current}">${current}</option>`);
      }
      state.users.forEach((u) => {
        const id = String(u.username || '').trim();
        if (!id || seen.has(id)) return;
        seen.add(id);
        options.push(`<option value="${id}">${id}</option>`);
      });
      if (!options.length) {
        select.innerHTML = '<option value="">暂无用户</option>';
      } else {
        select.innerHTML = options.join('');
      }
      select.value = current;
      renderEditUserHint();
    }

    function renderChainSelects() {
      const editSelect = document.getElementById('edit-chain-select');
      const options = state.chains
        .map((item) => {
          const id = String(item.chain_id || '');
          const name = String(item.name || id || 'unnamed');
          const chainType = normalizeChainType(item.chain_type);
          return `<option value="${id}">${name} (${id}) [${chainType}]</option>`;
        })
        .join('');
      editSelect.innerHTML = options || '<option value="">暂无链路</option>';
      editSelect.value = state.selectedChainID;

      renderPFChainSelect();
      renderPFSection();
    }

    function renderPFChainSelect() {
      const select = document.getElementById('pf-chain-select');
      const portForwardChains = state.chains.filter((item) => normalizeChainType(item.chain_type) === 'port_forward');
      const options = portForwardChains
        .map((item) => {
          const id = String(item.chain_id || '');
          const name = String(item.name || id || 'unnamed');
          return `<option value="${id}">${name} (${id})</option>`;
        })
        .join('');
      select.innerHTML = options || '<option value="">暂无端口转发链路</option>';
      const currentIsPF = portForwardChains.some((item) => String(item.chain_id || '') === String(state.selectedChainID || ''));
      select.value = currentIsPF ? state.selectedChainID : '';
    }

    function buildAddPayloadPreview() {
      const name = String(document.getElementById('add-chain-name').value || '').trim();
      const chainType = normalizeChainType(document.getElementById('add-chain-type').value);
      const nodeID = normalizeNodeID(document.getElementById('add-node-id').value);
      const relayDomains = state.nodeDomainsByID[nodeID] || [];
      const relayHost = relayDomains[0] || '';
      return {
        name,
        chain_type: chainType,
        node_id: nodeID,
        defaults: {
          listen_host: DEFAULTS.listenHost,
          listen_port: DEFAULTS.listenPort,
          link_layer: DEFAULTS.linkLayer,
          dial_mode: DEFAULTS.dialMode,
          egress_host: DEFAULTS.egressHost,
          egress_port: DEFAULTS.egressPort,
          relay_host: relayHost,
        },
      };
    }

    function renderAddPreview() {
      document.getElementById('add-preview').textContent = JSON.stringify(buildAddPayloadPreview(), null, 2);
    }

    async function createMinimalChain() {
      const name = String(document.getElementById('add-chain-name').value || '').trim();
      const chainType = normalizeChainType(document.getElementById('add-chain-type').value);
      const nodeID = normalizeNodeID(document.getElementById('add-node-id').value);
      if (!name) {
        setStatus('链路名称不能为空', 'warn');
        return;
      }
      if (!nodeID) {
        setStatus('请选择节点', 'warn');
        return;
      }
      if (!state.selectedUser) {
        setStatus('当前无可用用户，无法创建链路', 'warn');
        return;
      }
      if (!state.selectedPublicKey) {
        await refreshSelectedPublicKey();
        if (!state.selectedPublicKey) {
          setStatus('默认用户公钥为空，无法创建链路', 'warn');
          return;
        }
      }

      const domains = await ensureNodeDomains(nodeID);
      const relayHost = domains[0] || '';

      const payload = {
        name,
        chain_type: chainType,
        user_id: state.selectedUser,
        user_public_key: state.selectedPublicKey,
        secret: '',
        entry_node_id: nodeID,
        exit_node_id: nodeID,
        cascade_node_ids: [],
        listen_host: DEFAULTS.listenHost,
        listen_port: DEFAULTS.listenPort,
        link_layer: DEFAULTS.linkLayer,
        hop_configs: [{
          node_no: Number.parseInt(nodeID, 10),
          listen_host: DEFAULTS.listenHost,
          listen_port: DEFAULTS.listenPort,
          external_port: 0,
          link_layer: DEFAULTS.linkLayer,
          dial_mode: DEFAULTS.dialMode,
          relay_host: relayHost,
        }],
        port_forwards: [],
        egress_host: DEFAULTS.egressHost,
        egress_port: DEFAULTS.egressPort,
      };

      const result = await requestJSON('/mng/api/link/chain/upsert', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      await loadChains(true);
      state.selectedChainID = String((result.item && result.item.chain_id) || '');
      await selectChainForEdit(state.selectedChainID);
      renderChainSelects();
      renderPFSection();
      setStatus(result.apply_ok === false ? `链路已创建，但应用失败：${result.apply_error || '-'}` : '链路已创建并应用', result.apply_ok === false ? 'warn' : 'ok');
    }

    function resetAddForm() {
      document.getElementById('add-chain-name').value = '';
      document.getElementById('add-chain-type').value = 'port_forward';
      if (state.nodes.length) {
        document.getElementById('add-node-id').value = String(state.nodes[0].node_no);
      }
      renderAddPreview();
    }

    async function selectChainForEdit(chainID) {
      state.selectedChainID = String(chainID || '').trim();
      const chain = selectedChain();
      if (!chain) {
        state.editForm = {
          chainID: '',
          name: '',
          chainType: 'port_forward',
          userID: '',
          userPublicKey: '',
          secret: '',
          hops: [],
          portForwards: [],
        };
        renderEditUserSelect();
        renderEditHops();
        renderPFSection();
        return;
      }

      const routeNodeIDs = parseRouteNodeIDs(chain);
      const hopMap = new Map();
      (Array.isArray(chain.hop_configs) ? chain.hop_configs : []).forEach((hop) => {
        const id = normalizeNodeID(hop.node_no);
        if (!id) return;
        hopMap.set(id, hop);
      });

      const hops = [];
      for (const nodeID of routeNodeIDs) {
        const hop = hopMap.get(nodeID) || {};
        const domains = await ensureNodeDomains(nodeID);
        let relayHost = String(hop.relay_host || '').trim();
        if (!relayHost && domains.length > 0) {
          relayHost = domains[0];
        }
        hops.push({
          node_no: Number.parseInt(nodeID, 10),
          listen_host: String(hop.listen_host || chain.listen_host || DEFAULTS.listenHost).trim() || DEFAULTS.listenHost,
          listen_port: normalizePort(hop.listen_port, normalizePort(chain.listen_port, DEFAULTS.listenPort)),
          external_port: normalizePort(hop.external_port, 0),
          link_layer: normalizeLayer(hop.link_layer || chain.link_layer || DEFAULTS.linkLayer),
          dial_mode: normalizeDialMode(hop.dial_mode || DEFAULTS.dialMode),
          relay_host: relayHost,
        });
      }

      const portForwards = (Array.isArray(chain.port_forwards) ? chain.port_forwards : []).map((rule) => ({
        id: String(rule.id || '').trim() || generateRuleID(),
        name: String(rule.name || '').trim(),
        entry_side: String(rule.entry_side || 'chain_entry').trim() === 'chain_exit' ? 'chain_exit' : 'chain_entry',
        listen_host: String(rule.listen_host || DEFAULTS.portForwardListenHost).trim() || DEFAULTS.portForwardListenHost,
        listen_port: normalizePort(rule.listen_port, 0),
        target_host: String(rule.target_host || '').trim(),
        target_port: normalizePort(rule.target_port, 0),
        network: (() => {
          const net = String(rule.network || 'tcp').trim().toLowerCase();
          if (net === 'udp') return 'udp';
          if (net === 'both') return 'both';
          return 'tcp';
        })(),
        enabled: rule.enabled === true,
      }));

      state.editForm = {
        chainID: String(chain.chain_id || '').trim(),
        name: String(chain.name || '').trim(),
        chainType: normalizeChainType(chain.chain_type),
        userID: String(chain.user_id || '').trim(),
        userPublicKey: String(chain.user_public_key || '').trim(),
        secret: String(chain.secret || '').trim(),
        hops,
        portForwards,
      };

      document.getElementById('edit-chain-name').value = state.editForm.name;
      document.getElementById('edit-chain-type').value = state.editForm.chainType;
      renderEditUserSelect();
      document.getElementById('edit-chain-user').value = state.editForm.userID;
      renderEditHops();
      renderPFSection();
    }

    function buildDomainSelectOptions(nodeID, currentValue) {
      const normalized = normalizeNodeID(nodeID);
      const list = Array.isArray(state.nodeDomainsByID[normalized]) ? state.nodeDomainsByID[normalized] : [];
      const values = list.slice();
      const current = String(currentValue || '').trim();
      if (current && !values.includes(current)) {
        values.unshift(current);
      }
      if (!values.length) {
        return '<option value="">(无可选域名)</option>';
      }
      return values
        .map((item, idx) => {
          const selected = current ? item === current : idx === 0;
          return `<option value="${item}" ${selected ? 'selected' : ''}>${item}</option>`;
        })
        .join('');
    }

    function renderEditHops() {
      const body = document.getElementById('edit-hop-body');
      if (!state.editForm.hops.length) {
        body.innerHTML = '<tr><td colspan="9" class="muted">当前链路无节点，请点击“添加节点”。</td></tr>';
        return;
      }

      body.innerHTML = state.editForm.hops.map((hop, index) => {
        const nodeID = normalizeNodeID(hop.node_no);
        const usedNodeIDs = new Set(state.editForm.hops.map((item) => normalizeNodeID(item.node_no)).filter(Boolean));
        usedNodeIDs.delete(nodeID);

        const nodeOptions = state.nodes.map((item) => {
          const candidate = normalizeNodeID(item.node_no);
          if (!candidate) return '';
          const disabled = usedNodeIDs.has(candidate) ? 'disabled' : '';
          const selected = candidate === nodeID ? 'selected' : '';
          return `<option value="${candidate}" ${disabled} ${selected}>#${candidate} ${item.node_name || ''}</option>`;
        }).join('');

        const relayOptions = buildDomainSelectOptions(nodeID, hop.relay_host);
        const relayLoadingHint = state.nodeDomainsLoading[nodeID] ? '<div class="small muted">域名加载中...</div>' : '';

        return `<tr>
          <td>${index + 1}${index === state.editForm.hops.length - 1 ? ' (出口)' : ''}</td>
          <td>
            <select data-hop-node="${index}" class="small">${nodeOptions}</select>
          </td>
          <td><input data-hop-listen-host="${index}" class="small" value="${hop.listen_host || ''}" /></td>
          <td><input data-hop-listen-port="${index}" class="small" type="number" min="1" max="65535" value="${hop.listen_port > 0 ? hop.listen_port : ''}" /></td>
          <td><input data-hop-external-port="${index}" class="small" type="number" min="1" max="65535" value="${hop.external_port > 0 ? hop.external_port : ''}" /></td>
          <td>
            <select data-hop-link-layer="${index}" class="small">
              <option value="http" ${hop.link_layer === 'http' ? 'selected' : ''}>http</option>
              <option value="http2" ${hop.link_layer === 'http2' ? 'selected' : ''}>http2</option>
              <option value="http3" ${hop.link_layer === 'http3' ? 'selected' : ''}>http3</option>
            </select>
          </td>
          <td>
            <select data-hop-dial-mode="${index}" class="small">
              <option value="forward" ${hop.dial_mode === 'forward' ? 'selected' : ''}>forward</option>
              <option value="reverse" ${hop.dial_mode === 'reverse' ? 'selected' : ''}>reverse</option>
            </select>
          </td>
          <td>
            <select data-hop-relay-host="${index}" class="wide">${relayOptions}</select>
            ${relayLoadingHint}
          </td>
          <td>
            <button class="btn" data-hop-up="${index}" type="button" ${index <= 0 ? 'disabled' : ''}>上移</button>
            <button class="btn" data-hop-down="${index}" type="button" ${index >= state.editForm.hops.length - 1 ? 'disabled' : ''}>下移</button>
            <button class="btn" data-hop-remove="${index}" type="button">删除</button>
          </td>
        </tr>`;
      }).join('');

      bindEditHopEvents();
    }

      document.querySelectorAll('[data-hop-relay-host]').forEach((el) => {

        el.addEventListener('click', () => {
          const idx = Number.parseInt(el.getAttribute('data-hop-up') || '-1', 10);
          if (idx <= 0 || idx >= state.editForm.hops.length) return;
          const temp = state.editForm.hops[idx - 1];
          state.editForm.hops[idx - 1] = state.editForm.hops[idx];
          state.editForm.hops[idx] = temp;

        el.addEventListener('click', () => {
          const idx = Number.parseInt(el.getAttribute('data-hop-remove') || '-1', 10);

    async function addHopToEdit() {
      const used = new Set(state.editForm.hops.map((item) => normalizeNodeID(item.node_no)).filter(Boolean));
      const candidate = state.nodes.find((item) => !used.has(normalizeNodeID(item.node_no)));
      if (!candidate) {
        setStatus('没有可添加的新节点（节点不可重复）', 'warn');
        return;
      }
      const nodeID = normalizeNodeID(candidate.node_no);
      const domains = await ensureNodeDomains(nodeID);
      state.editForm.hops.push({
        node_no: Number.parseInt(nodeID, 10),
        listen_host: DEFAULTS.listenHost,
        listen_port: DEFAULTS.listenPort,
        external_port: 0,
        link_layer: DEFAULTS.linkLayer,
        dial_mode: DEFAULTS.dialMode,
        relay_host: domains[0] || '',
      });
      renderEditHops();
    }

    function buildUpsertPayloadFromEdit(portForwardsOverride) {
      const hops = state.editForm.hops.map((hop) => ({
        node_no: Number.parseInt(normalizeNodeID(hop.node_no), 10),
        listen_host: String(hop.listen_host || '').trim() || DEFAULTS.listenHost,
        listen_port: normalizePort(hop.listen_port, 0),
        external_port: normalizePort(hop.external_port, 0),
        link_layer: normalizeLayer(hop.link_layer),
        dial_mode: normalizeDialMode(hop.dial_mode),
        relay_host: String(hop.relay_host || '').trim(),
      })).filter((hop) => Number.isFinite(hop.node_no) && hop.node_no > 0);

      if (!hops.length) {
        throw new Error('请至少保留一个节点');
      }

      const routeNodeIDs = hops.map((item) => String(item.node_no));
      const entryNodeID = routeNodeIDs[0];
      const exitNodeID = routeNodeIDs[routeNodeIDs.length - 1];
      const cascadeNodeIDs = routeNodeIDs.slice(1, -1);
      const firstHop = hops[0];

      const selectedUserID = String(state.editForm.userID || '').trim() || state.selectedUser;
      const selectedPublicKey = String(state.editForm.userPublicKey || '').trim() || state.selectedPublicKey;
      if (!selectedUserID) {
        throw new Error('用户不能为空');
      }
      if (!selectedPublicKey) {
        throw new Error('用户公钥为空');
      }

      const portForwards = Array.isArray(portForwardsOverride)
        ? portForwardsOverride
        : state.editForm.portForwards.slice();

      return {
        chain_id: String(state.editForm.chainID || '').trim(),
        name: String(state.editForm.name || '').trim(),
        chain_type: normalizeChainType(state.editForm.chainType),
        user_id: selectedUserID,
        user_public_key: selectedPublicKey,
        secret: String(state.editForm.secret || '').trim(),
        entry_node_id: entryNodeID,
        exit_node_id: exitNodeID,
        cascade_node_ids: cascadeNodeIDs,
        listen_host: firstHop.listen_host || DEFAULTS.listenHost,
        listen_port: normalizePort(firstHop.listen_port, DEFAULTS.listenPort),
        link_layer: normalizeLayer(firstHop.link_layer || DEFAULTS.linkLayer),
        hop_configs: hops,
        port_forwards: portForwards,
        egress_host: DEFAULTS.egressHost,
        egress_port: DEFAULTS.egressPort,
      };
    }

    async function saveCurrentChain(portForwardsOverride) {
      if (!state.editForm.chainID) {
        throw new Error('请先选择链路');
      }
      state.editForm.name = String(document.getElementById('edit-chain-name').value || '').trim();
      state.editForm.chainType = normalizeChainType(document.getElementById('edit-chain-type').value);
      state.editForm.userID = String(document.getElementById('edit-chain-user').value || '').trim();
      if (!state.editForm.name) {
        throw new Error('链路名称不能为空');
      }
      if (!state.editForm.userPublicKey) {
        await refreshEditUserPublicKey();
      }

      const payload = buildUpsertPayloadFromEdit(portForwardsOverride);
      const result = await requestJSON('/mng/api/link/chain/upsert', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      await loadChains(true);
      state.selectedChainID = String((result.item && result.item.chain_id) || payload.chain_id || state.selectedChainID || '');
      await selectChainForEdit(state.selectedChainID);
      renderChainSelects();
      renderPFSection();
      setStatus(result.apply_ok === false ? `链路已保存，但应用失败：${result.apply_error || '-'}` : '链路已保存并应用', result.apply_ok === false ? 'warn' : 'ok');
    }

    async function deleteCurrentChain() {
      const chainID = String(state.selectedChainID || '').trim();
      if (!chainID) {
        setStatus('请先选择要删除的链路', 'warn');
        return;
      }
      const chain = selectedChain();
      const display = chain ? (chain.name || chain.chain_id || chainID) : chainID;
      if (!window.confirm(`确认删除链路 ${display} ?`)) {
        return;
      }
      const result = await requestJSON('/mng/api/link/chain/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chain_id: chainID }),
      });
      await loadChains(true);
      state.selectedChainID = state.chains.length ? String(state.chains[0].chain_id || '') : '';
      await selectChainForEdit(state.selectedChainID);
      renderChainSelects();
      renderPFSection();
      if (result.apply_ok === false) {
        setStatus(`链路已删除，但下发移除失败：${result.apply_error || '-'}`, 'warn');
      } else {
        setStatus('链路已删除', 'ok');
      }
    }

    function renderPFSummary() {
      const summary = document.getElementById('pf-summary');
      const rules = state.editForm.portForwards || [];
      const enabled = rules.filter((item) => item.enabled === true).length;
      summary.textContent = rules.length
        ? `共 ${rules.length} 条，已启用 ${enabled} 条，入口端 ${rules.filter((item) => item.entry_side === 'chain_entry').length} 条，出口端 ${rules.filter((item) => item.entry_side === 'chain_exit').length} 条`
        : '暂无规则';
    }

    function renderPFSection() {
      renderPFChainSelect();
      const body = document.getElementById('pf-body');
      const pfSelect = document.getElementById('pf-chain-select');
      const selectedPFChainID = String(pfSelect.value || '').trim();
      const chain = state.chains.find((item) => String(item.chain_id || '') === selectedPFChainID) || null;
      if (!chain || normalizeChainType(chain.chain_type) !== 'port_forward') {
        body.innerHTML = '<tr><td colspan="7" class="muted">请先选择端口转发链路（chain_type=port_forward）。</td></tr>';
        renderPFSummary();
        return;
      }
      if (String(state.editForm.chainID || '') !== selectedPFChainID) {
        body.innerHTML = '<tr><td colspan="7" class="muted">请先切换到该链路，加载其可编辑规则。</td></tr>';
        renderPFSummary();
        return;
      }

      const rules = state.editForm.portForwards || [];
      if (!rules.length) {
        body.innerHTML = '<tr><td colspan="7" class="muted">暂无规则，请点击“添加规则”。</td></tr>';
        renderPFSummary();
        return;
      }

      body.innerHTML = rules.map((rule, idx) => `
        <tr>
          <td><input data-pf-name="${idx}" value="${rule.name || ''}" placeholder="${rule.id}" /></td>
          <td>
            <select data-pf-entry="${idx}">
              <option value="chain_entry" ${rule.entry_side === 'chain_entry' ? 'selected' : ''}>chain_entry</option>
              <option value="chain_exit" ${rule.entry_side === 'chain_exit' ? 'selected' : ''}>chain_exit</option>
            </select>
          </td>
          <td>
            <input data-pf-listen-host="${idx}" class="small" value="${rule.listen_host || ''}" />
            <input data-pf-listen-port="${idx}" class="small" type="number" min="1" max="65535" value="${rule.listen_port > 0 ? rule.listen_port : ''}" />
          </td>
          <td>
            <input data-pf-target-host="${idx}" class="small" value="${rule.target_host || ''}" />
            <input data-pf-target-port="${idx}" class="small" type="number" min="1" max="65535" value="${rule.target_port > 0 ? rule.target_port : ''}" />
          </td>
          <td>
            <select data-pf-network="${idx}">
              <option value="tcp" ${rule.network === 'tcp' ? 'selected' : ''}>tcp</option>
              <option value="udp" ${rule.network === 'udp' ? 'selected' : ''}>udp</option>
              <option value="both" ${rule.network === 'both' ? 'selected' : ''}>both</option>
            </select>
          </td>
          <td>
            <label><input data-pf-enabled="${idx}" type="checkbox" ${rule.enabled ? 'checked' : ''} /> enabled</label>
          </td>
          <td>
            <button class="btn" data-pf-remove="${idx}" type="button">删除</button>
            <div class="small muted">${rule.id}</div>
          </td>
        </tr>
      `).join('');
      bindPFEvents();
      renderPFSummary();
    }

      document.getElementById('edit-chain-user').addEventListener('change', () => {
        state.editForm.userID = String(document.getElementById('edit-chain-user').value || '').trim();
        refreshEditUserPublicKey().catch((err) => setStatus(`读取用户公钥失败：${err.message || err}`, 'err'));
      });
      document.getElementById('btn-delete-selected').addEventListener('click', () => {
        deleteCurrentChain().catch((err) => setStatus(`删除链路失败：${err.message || err}`, 'err'));
      });
      document.getElementById('btn-save-chain').addEventListener('click', () => {
        saveCurrentChain().catch((err) => setStatus(`保存链路失败：${err.message || err}`, 'err'));
      });
      document.getElementById('btn-add-hop').addEventListener('click', () => {
        addHopToEdit().catch((err) => setStatus(`添加节点失败：${err.message || err}`, 'err'));
      });

      document.getElementById('pf-chain-select').addEventListener('change', (e) => {
        selectChainForEdit(String(e.target.value || '')).catch((err) => setStatus(`切换链路失败：${err.message || err}`, 'err'));
      });
      document.getElementById('btn-pf-add').addEventListener('click', addPFRule);
      document.getElementById('btn-pf-save').addEventListener('click', () => {
        savePFRules().catch((err) => setStatus(`保存规则失败：${err.message || err}`, 'err'));
      });
    }

    async function bootstrap() {
      bindTabs();
      bindActions();
      const ok = await ensureSession().catch(() => false);
      if (!ok) {
        location.href = '/mng';
        return;
      }

      await loadUsers();
      await loadNodes();
      await loadChains(true);

      if (state.nodes.length) {
        document.getElementById('add-node-id').value = String(state.nodes[0].node_no);
        await ensureNodeDomains(String(state.nodes[0].node_no));
      }
      renderAddDefaultUser();
      renderAddPreview();

      if (state.selectedChainID) {
        await selectChainForEdit(state.selectedChainID);
      }

      setStatus('链路管理页面初始化完成', 'ok');
    }

    bootstrap().catch((err) => {
      setStatus(`初始化失败：${err && err.message ? err.message : err}`, 'err');
    });
  </script>
</body>
</html>
